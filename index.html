async function deleteTx(txId){
  try{
    if(!requireOwner("لاگ کی انٹری ڈیلیٹ کرنا")) return;
    const tx = state.txs.find(t=>t.id===txId);
    if(!tx) return showError("یہ انٹری اب موجود نہیں۔");
    if(!isOnline) return showError("انٹرنیٹ کنکشن نہیں ہے — ڈیلیٹ صرف انٹرنیٹ بحال ہونے پر ممکن ہے۔");
    const ok = await askConfirm("کیا آپ واقعی یہ انٹری ڈیلیٹ کرنا چاہتے ہیں؟ اس کا اثر متعلقہ اسٹاک اور حساب پر خودکار پڑے گا — بالکل ویسا ہی ہو جائے گا جیسا اس انٹری سے پہلے تھا۔");
    if(!ok) return;
    const success = await applyTxDeletion(tx);
    render();
    if(success!==false) showSuccess("انٹری ڈیلیٹ کر دی گئی اور اثر ریورس ہو گیا۔");
  }catch(e){ showError("ڈیلیٹ کرتے وقت خرابی پیش آئی: "+e.message); }
}

async function applyTxDeletion(tx){
  if(tx.type==="sale" && tx.items){
    // Only restore stock for products that still exist — putting units back on a
    // permanently-deleted product id would create invisible "ghost stock" that no
    // screen can ever show or sell.
    for(const it of tx.items){ if(productOf(it.productId)) await stockDelta(tx.pointId, it.productId, it.qty); }
    if(tx.monthKey) await pointDelta(tx.monthKey, tx.pointId, -tx.totalAmount, -tx.fullProfit, -tx.yourShare);
    // If this bill had added credit (or advance) to a customer's ledger, reverse that too —
    // otherwise deleting the bill would leave the customer still owing money for a sale
    // that no longer exists.
    if(tx.customerId && (tx.creditAdded||0)!==0){
      await customerBalanceDelta(tx.pointId, tx.customerId, -(tx.creditAdded||0));
    }
  }
  else if(tx.type==="payment"){
    // Deleting a recorded payment/refund means that money never moved — reverse it on
    // the customer's balance so the ledger matches reality again. Receipts reversed by
    // adding the amount back; refunds (money paid OUT to the customer) by subtracting.
    if(tx.pointId && tx.custId && tx.amount){
      await customerBalanceDelta(tx.pointId, tx.custId, tx.refund ? -tx.amount : tx.amount);
    }
  }
  else if(tx.type==="return"){
    const res = await stockDelta(tx.pointId, tx.productId, -tx.qty);
    if(!res.committed){
      const avail = res.snapshot ? (res.snapshot.val()||0) : 0;
      showError(`${locLabel(tx.pointId)} پر صرف ${avail} یونٹ موجود ہے — یہ انٹری ڈیلیٹ نہیں ہو سکتی۔`);
      return false;
    }
    if(tx.monthKey) await pointDelta(tx.monthKey, tx.pointId, tx.amount, tx.fullProfit, tx.yourShare);
    // If this return had settled a customer's account, undo that settlement too.
    if(tx.custId && tx.balanceDelta){ await customerBalanceDelta(tx.pointId, tx.custId, -tx.balanceDelta); }
  }
  else if(tx.type==="transfer"){
    const res = await stockDelta(tx.to, tx.productId, -tx.qty);
    if(!res.committed){
      const avail = res.snapshot ? (res.snapshot.val()||0) : 0;
      showError(`${locLabel(tx.to)} پر صرف ${avail} یونٹ موجود ہے — یہ انٹری ڈیلیٹ نہیں ہو سکتی۔`);
      return false;
    }
    await stockDelta(tx.from, tx.productId, tx.qty);
  }
  else if(tx.type==="loss"){
    if(tx.loc && tx.productId){ await stockDelta(tx.loc, tx.productId, tx.qty); }
  }
  else if(tx.type==="purchase"){
    const res = await stockDelta(tx.loc, tx.productId, -tx.qty);
    if(!res.committed){
      const avail = res.snapshot ? (res.snapshot.val()||0) : 0;
      showError(`${locLabel(tx.loc)} پر صرف ${avail} یونٹ موجود ہے — یہ انٹری ڈیلیٹ نہیں ہو سکتی۔`);
      return false;
    }
  }
  else if(tx.type==="close" && tx.monthKey){
    // undo the close: reopen that month and point active entry back to it
    await db.ref("months/"+tx.monthKey+"/status").set("open");
    await db.ref("months/"+tx.monthKey+"/closedAt").remove();
    await db.ref("activeMonthKey").set(tx.monthKey);
  }
  else if(tx.type==="reopen" && tx.monthKey){
    // undo the reopen: close that month again and restore whichever month was active before the reopen
    await db.ref("months/"+tx.monthKey+"/status").set("closed");
    await db.ref("months/"+tx.monthKey+"/closedAt").set(dateOnlyStr());
    if(tx.previousActiveKey) await db.ref("activeMonthKey").set(tx.previousActiveKey);
  }
  else if(tx.type==="delete" && tx.resetType==="location" && tx.beforeStock){
    // undo a single-location stock reset: put every zeroed quantity back
    for(const [pid, qty] of Object.entries(tx.beforeStock)){ await stockDelta(tx.resetLoc, pid, qty); }
  }
  else if(tx.type==="delete" && tx.resetType==="allLocations" && tx.beforeStockAll){
    // undo an all-locations stock reset: put every zeroed quantity back, at every location
    for(const [locId, perLoc] of Object.entries(tx.beforeStockAll)){
      for(const [pid, qty] of Object.entries(perLoc)){ await stockDelta(locId, pid, qty); }
    }
  }
  else if(tx.type==="delete" && tx.resetType==="catalog" && tx.beforeProducts){
    // undo a full catalog reset: restore the entire product list and stock tree exactly as it was
    await db.ref("products").set(tx.beforeProducts);
    await db.ref("stock").set(tx.beforeStock||{godown:{}});
  }
  // other "add"/"delete" entries (e.g. a plain product soft-delete): no stock/financial reversal, just remove the log line

  await db.ref("txs/"+tx.id).remove();
  return true;
}

/* ====================== ATOMIC OPS ====================== */
function stockDelta(loc, pid, delta){
  // HARD GUARD: an empty loc/pid would make the Firebase path point at a whole
  // parent node (e.g. "stock/godown/") and the transaction would overwrite the
  // ENTIRE location's stock with garbage. Never allow that under any caller.
  if(!loc || !pid) return Promise.resolve({committed:false, snapshot:null});
  return db.ref("stock/"+loc+"/"+pid).transaction(current=>{
    const cur = current || 0;
    const next = cur + delta;
    if(next < 0) return; // abort -> insufficient stock
    return next;
  });
}
function pointDelta(monthKey, pointId, sale, profit, share){
  return db.ref("months/"+monthKey+"/points/"+pointId).transaction(current=>{
    const c = current || {sale:0, profit:0, share:0};
    return {
      sale: round2((c.sale||0)+sale),
      profit: round2((c.profit||0)+profit),
      share: round2((c.share||0)+share),
    };
  });
}
async function ensureMonthExists(monthKey){
  const snap = await db.ref("months/"+monthKey).once("value");
  if(!snap.exists()){
    const {year, month} = parseMonthKey(monthKey);
    const points = {};
    state.sellPoints.forEach(p=>{ points[p.id] = {sale:0,profit:0,share:0}; });
    await db.ref("months/"+monthKey).set({year, month, label: monthLabelOf(year,month), status:"open", points});
  }
}

/* ====================== ACTIONS ====================== */
function addProduct(name, code, cost, rate, lowStock, barcode){
  name = (name||"").trim();
  if(!name) return showError("پروڈکٹ کا نام لکھیں۔"), false;
  cost = Number(cost)||0; rate = Number(rate)||0;
  if(rate<=0) return showError("سیل ریٹ درج کریں۔"), false;
  lowStock = Number(lowStock); if(!lowStock || lowStock<0) lowStock = DEFAULT_LOW_STOCK;
  barcode = (barcode||"").trim();
  if(barcode && state.products.some(p=>p.barcode===barcode)) return showError("یہ بارکوڈ پہلے سے کسی اور پروڈکٹ پر لگا ہوا ہے۔"), false;
  if(state.products.some(p=>!p.deleted && p.name.trim().toLowerCase()===name.toLowerCase())) return showError(`"${name}" کے نام کا پروڈکٹ پہلے سے موجود ہے۔`), false;
  const id = db.ref("products").push().key;
  const updates = {};
  updates["products/"+id] = {id, name, code:(code||"").trim()||"-", cost, rate, lowStock, barcode: barcode||null};
  allLocs().forEach(l=>{ updates["stock/"+l.id+"/"+id] = 0; });
  db.ref().update(updates);
  logTx("add", {note:`نیا پروڈکٹ شامل: ${name} (خرید ${rupee(cost)} — سیل ${rupee(rate)})`});
  return true;
}

function findProductByBarcode(code){
  code = String(code||"").trim();
  return state.products.find(p=>!p.deleted && p.barcode && p.barcode===code);
}
async function assignBarcodeToProduct(pid, code){
  code = String(code||"").trim();
  if(!code) return;
  if(state.products.some(p=>p.id!==pid && p.barcode===code)) return showError("یہ بارکوڈ پہلے سے کسی اور پروڈکٹ پر محفوظ ہے۔");
  await db.ref("products/"+pid+"/barcode").set(code);
  showSuccess("بارکوڈ محفوظ ہو گیا۔");
}

/* ====================== BULK IMPORT NEW ITEMS FROM EXCEL ====================== */
// Columns (fixed, deliberately with NO per-store columns): نام، بارکوڈ، خرید ریٹ، سیل ریٹ، گودام تعداد.
// Store names/quantities are intentionally excluded from the template — if a sell point is ever
// renamed, a template with per-store columns would silently go stale; distributing from godown
// via the existing Transfer tab afterward avoids that entirely.
let pendingImportRows = null;

function downloadImportTemplate(){
  if(typeof XLSX === "undefined"){ showError("Excel سہولت لوڈ نہیں ہو سکی — انٹرنیٹ کنکشن چیک کریں۔"); return; }
  const rows = [
    ["نام", "بارکوڈ", "خرید ریٹ", "سیل ریٹ", "گودام تعداد"],
    ["Blade Dorco Large (یہ مثال ہے، ہٹا دیں)", "8964000112233", 15, 30, 50],
  ];
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"] = [{wch:34},{wch:20},{wch:14},{wch:14},{wch:16}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Items");
  XLSX.writeFile(wb, "al-ammar-import-template.xlsx");
}

function handleImportFileSelected(e){
  const file = e.target.files[0];
  e.target.value = ""; // allow re-selecting the exact same file later
  if(!file) return;
  if(typeof XLSX === "undefined"){ showError("Excel سہولت لوڈ نہیں ہو سکی — انٹرنیٹ کنکشن چیک کریں۔"); return; }
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const wb = XLSX.read(new Uint8Array(ev.target.result), {type:"array"});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:""});
      processImportRows(rows);
    }catch(err){
      showError("فائل پڑھنے میں خرابی: "+err.message);
    }
  };
  reader.onerror = ()=> showError("فائل پڑھی نہیں جا سکی۔");
  reader.readAsArrayBuffer(file);
}

function processImportRows(rows){
  const dataRows = rows.slice(1); // first row is always the header, per the template
  const existingNames = new Set(state.products.map(p=>p.name.trim().toLowerCase()));
  const existingBarcodes = new Set(state.products.filter(p=>p.barcode).map(p=>p.barcode));
  const seenNamesInFile = new Set();
  const toAdd = [], duplicateNames = [], barcodeConflicts = [];

  dataRows.forEach(row=>{
    const name = String(row[0]==null?"":row[0]).trim();
    if(!name) return; // silently skip blank rows
    const lowerName = name.toLowerCase();
    if(existingNames.has(lowerName) || seenNamesInFile.has(lowerName)){
      duplicateNames.push(name);
      return;
    }
    let barcode = String(row[1]==null?"":row[1]).trim();
    const cost = Number(row[2])||0;
    const rate = Number(row[3])||0;
    const godownQty = Math.max(0, Number(row[4])||0);
    if(barcode && (existingBarcodes.has(barcode) || toAdd.some(it=>it.barcode===barcode))){
      barcodeConflicts.push(`${name} (${barcode})`);
      barcode = ""; // still import the item, just without the conflicting barcode
    }
    seenNamesInFile.add(lowerName);
    toAdd.push({name, barcode, cost, rate, godownQty});
  });

  pendingImportRows = toAdd;
  renderImportPreview(toAdd, duplicateNames, barcodeConflicts);
}

function renderImportPreview(toAdd, duplicateNames, barcodeConflicts){
  const el = document.getElementById("import-preview-area");
  if(!el) return;
  if(toAdd.length===0 && duplicateNames.length===0 && barcodeConflicts.length===0){
    el.innerHTML = `<div class="muted">فائل میں کوئی درست آئٹم (نام کے ساتھ) نہیں ملا۔</div>`;
    return;
  }
  el.innerHTML = `<div class="card" style="border:2px solid var(--gold);">
    <h3 style="font-size:14.5px;">امپورٹ پیش نظارہ — ابھی کچھ محفوظ نہیں ہوا</h3>
    <div style="margin-bottom:10px;font-size:13px;">
      <div style="color:var(--green);font-weight:700;">✅ ${toAdd.length} نئے آئٹمز شامل ہوں گے</div>
      ${duplicateNames.length?`<div style="color:var(--red);margin-top:6px;">⚠️ ${duplicateNames.length} آئٹمز پہلے سے موجود نام کی وجہ سے چھوڑ دیے جائیں گے: ${duplicateNames.slice(0,12).map(esc).join("، ")}${duplicateNames.length>12?"...":""}</div>`:""}
      ${barcodeConflicts.length?`<div style="color:var(--gold);margin-top:6px;">⚠️ ${barcodeConflicts.length} بارکوڈز پہلے سے کسی اور آئٹم پر محفوظ ہیں — یہ آئٹمز بغیر بارکوڈ کے شامل ہوں گے: ${barcodeConflicts.slice(0,12).map(esc).join("، ")}${barcodeConflicts.length>12?"...":""}</div>`:""}
    </div>
    ${toAdd.length>0?`<div style="max-height:260px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;margin-bottom:12px;">
      <table style="width:100%;font-size:12px;"><thead><tr><th>نام</th><th>بارکوڈ</th><th>خرید</th><th>سیل</th><th>گودام</th></tr></thead><tbody>
      ${toAdd.map(it=>`<tr><td style="direction:ltr;text-align:left;">${esc(it.name)}</td><td style="direction:ltr;">${esc(it.barcode||"-")}</td><td>${it.cost}</td><td>${it.rate}</td><td>${it.godownQty}</td></tr>`).join("")}
      </tbody></table>
    </div>
    <button class="btn" style="background:var(--green);width:100%;margin-bottom:8px;" onclick="confirmImport()">✅ تصدیق کریں اور ${toAdd.length} آئٹمز امپورٹ کریں</button>`:""}
    <button class="btn-ghost" style="width:100%;" onclick="cancelImport()">منسوخ کریں</button>
  </div>`;
}

function cancelImport(){
  pendingImportRows = null;
  const el = document.getElementById("import-preview-area");
  if(el) el.innerHTML = "";
}

async function confirmImport(){
  if(!requireOwner("ایکسل سے آئٹمز امپورٹ کرنا")) return;
  if(!pendingImportRows || pendingImportRows.length===0) return;
  const ok = await askConfirm(`کیا آپ واقعی یہ ${pendingImportRows.length} نئے آئٹمز شامل کرنا چاہتے ہیں؟`);
  if(!ok) return;
  const updates = {};
  pendingImportRows.forEach(it=>{
    const id = db.ref("products").push().key;
    updates["products/"+id] = {id, name:it.name, code:"-", cost:it.cost, rate:it.rate, lowStock:DEFAULT_LOW_STOCK, barcode: it.barcode||null};
    updates["stock/godown/"+id] = it.godownQty;
    state.sellPoints.forEach(sp=>{ updates["stock/"+sp.id+"/"+id] = 0; });
  });
  const count = pendingImportRows.length;
  await db.ref().update(updates);
  logTx("add", {note:`ایکسل سے امپورٹ: ${count} نئے آئٹمز شامل کیے گئے`});
  showSuccess(`${count} آئٹمز کامیابی سے شامل ہو گئے۔`);
  cancelImport();
  render();
}

/* ---- camera barcode scanning (html5-qrcode) — used from Add Product, product rows, and every item picker ---- */
let _qrScanner = null;
function openBarcodeScanner(onDetected){
  if(typeof Html5Qrcode === "undefined"){
    showError("بارکوڈ اسکینر لوڈ نہیں ہو سکا — انٹرنیٹ کنکشن چیک کریں۔");
    return;
  }
  const overlay = document.getElementById("barcodeOverlay");
  overlay.style.display = "flex";
  _qrScanner = new Html5Qrcode("barcode-reader");
  let done = false;
  const stop = ()=>{
    if(_qrScanner){ _qrScanner.stop().then(()=>_qrScanner.clear()).catch(()=>{}); _qrScanner=null; }
    overlay.style.display = "none";
  };
  document.getElementById("barcodeCancelBtn").onclick = ()=>{ stop(); };
  _qrScanner.start(
    {facingMode:"environment"},
    {fps:10, qrbox:{width:240,height:150}},
    code=>{ if(done) return; done=true; stop(); onDetected(code); },
    ()=>{}
  ).catch(()=>{
    showError("کیمرہ کھولنے میں ناکامی — کیمرے کی اجازت (permission) چیک کریں۔");
    overlay.style.display = "none";
  });
}

function updateLowStock(pid, value){
  const v = Number(value);
  if(!v || v<0) return;
  db.ref("products/"+pid+"/lowStock").set(v);
}

async function updateProductPrice(pid, field, value){
  if(!requireOwner("قیمت تبدیل کرنا")) return;
  const p = productOf(pid);
  if(!p) return;
  const v = Number(value);
  if(isNaN(v) || v<0) return showError("درست رقم درج کریں۔");
  if(field==="rate" && v<=0) return showError("سیل ریٹ 0 سے زیادہ ہونا چاہیے۔");
  const oldVal = p[field];
  if(oldVal===v) return;
  await db.ref("products/"+pid+"/"+field).set(v);
  logTx("add", {note:`قیمت تبدیل: ${p.name} — ${field==="cost"?"خرید":"سیل"} ریٹ ${rupee(oldVal)} سے ${rupee(v)}`});
  showSuccess("قیمت اپڈیٹ ہو گئی۔");
}

async function deleteProduct(pid){
  try{
    const p = productOf(pid);
    if(!p) return showError("یہ پروڈکٹ اب موجود نہیں۔");
    const totalStock = allLocs().reduce((s,l)=>s+getQty(l.id,pid),0);
    // Soft-delete (move to "ہٹائے گئے پروڈکٹس") always succeeds, even with stock still on hand —
    // the stock stays exactly where it is and is fully recoverable via "بحال کریں", or can be
    // written off later via "زبردستی حذف کریں". Only permanent deletion still requires zero stock.
    const msg = totalStock>0
      ? `کیا آپ واقعی "${p.name}" کو پروڈکٹ لسٹ سے ہٹانا چاہتے ہیں؟ ابھی بھی ${totalStock} یونٹ اسٹاک (تمام لوکیشنز ملا کر) موجود ہے — وہ اسٹاک بدستور محفوظ رہے گا، بس یہ آئٹم نئی سیل/ٹرانسفر کے لیے منتخب نہیں ہو سکے گا۔ بعد میں چاہیں تو بحال کر سکتے ہیں یا زبردستی حذف کر سکتے ہیں۔`
      : `کیا آپ واقعی "${p.name}" کو پروڈکٹ لسٹ سے ہٹانا چاہتے ہیں؟ پرانا ریکارڈ (لاگ/رپورٹس) محفوظ رہے گا، بس یہ نئی سیل/ٹرانسفر کے لیے منتخب نہیں ہو سکے گا۔`;
    const ok = await askConfirm(msg);
    if(!ok) return;
    await db.ref("products/"+pid+"/deleted").set(true);
    await db.ref("products/"+pid+"/deletedAt").set(dateOnlyStr());
    logTx("delete", {note:`پروڈکٹ ہٹا دیا گیا: ${p.name}`});
    showSuccess(`"${p.name}" ہٹا دیا گیا۔`);
  }catch(e){ showError("ڈیلیٹ کرتے وقت خرابی: "+e.message); }
}

async function restoreProduct(pid){
  const p = productOf(pid);
  if(!p) return;
  await db.ref("products/"+pid+"/deleted").set(false);
  logTx("restore", {note:`پروڈکٹ بحال کر دیا گیا: ${p.name}`});
  showSuccess(`"${p.name}" واپس فہرست میں شامل ہو گیا۔`);
}

async function permanentlyDeleteProduct(pid){
  try{
    if(!requireOwner("مستقل حذف کرنا")) return;
    const p = productOf(pid);
    if(!p) return showError("یہ پروڈکٹ اب موجود نہیں۔");
    const totalStock = allLocs().reduce((s,l)=>s+getQty(l.id,pid),0);
    if(totalStock>0){
      showError(`"${p.name}" حذف نہیں ہو سکتا — ابھی بھی ${totalStock} یونٹ اسٹاک موجود ہے۔ اسے صاف کریں، یا "زبردستی حذف کریں" استعمال کریں۔`);
      return;
    }
    const ok = await askConfirm(`⚠️ کیا آپ واقعی "${p.name}" کو ہمیشہ کے لیے حذف کرنا چاہتے ہیں؟ یہ عمل واپس نہیں ہو سکتا (بحال کرنے کا آپشن ختم ہو جائے گا)۔`);
    if(!ok) return;
    const updates = {};
    updates["products/"+pid] = null;
    allLocs().forEach(l=>{ updates["stock/"+l.id+"/"+pid] = null; });
    await db.ref().update(updates);
    logTx("delete", {note:`پروڈکٹ ہمیشہ کے لیے حذف کر دیا گیا: ${p.name}`});
    showSuccess(`"${p.name}" مکمل طور پر حذف ہو گیا۔`);
  }catch(e){ showError("حذف کرتے وقت خرابی: "+e.message); }
}

async function forceDeleteProduct(pid){
  try{
    if(!requireOwner("زبردستی حذف کرنا")) return;
    const p = productOf(pid);
    if(!p) return showError("یہ پروڈکٹ اب موجود نہیں۔");
    const totalStock = allLocs().reduce((s,l)=>s+getQty(l.id,pid),0);
    const msg = totalStock>0
      ? `⚠️ "${p.name}" کے پاس ابھی بھی ${totalStock} یونٹ اسٹاک موجود ہے (مختلف جگہوں پر)۔ زبردستی حذف کرنے پر یہ تمام اسٹاک خودکار "نقصان" کے طور پر درج ہو کر ختم ہو جائے گا (رپورٹ میں نظر آئے گا)، اور پروڈکٹ ہمیشہ کے لیے حذف ہو جائے گی۔ یہ عمل واپس نہیں ہو سکتا۔ جاری رکھیں؟`
      : `⚠️ کیا آپ واقعی "${p.name}" کو ہمیشہ کے لیے حذف کرنا چاہتے ہیں؟ یہ عمل واپس نہیں ہو سکتا۔`;
    const ok = await askConfirm(msg);
    if(!ok) return;
    // write off any existing stock as a loss first, per location, so the discrepancy report
    // stays accurate and nothing silently vanishes from the numbers.
    for(const loc of allLocs()){
      const qty = getQty(loc.id, pid);
      if(qty>0){
        await stockDelta(loc.id, pid, -qty);
        logTx("loss", {
          note:`${p.name} — ${locLabel(loc.id)} پر ${qty} یونٹ (پروڈکٹ زبردستی حذف کرنے کی وجہ سے نقصان میں درج)`,
          qty, value: qty*p.cost, reason:"پروڈکٹ حذف", loc:loc.id, productId:pid,
        });
      }
    }
    const updates = {};
    updates["products/"+pid] = null;
    allLocs().forEach(l=>{ updates["stock/"+l.id+"/"+pid] = null; });
    await db.ref().update(updates);
    logTx("delete", {note:`پروڈکٹ زبردستی حذف کر دیا گیا: ${p.name}`});
    showSuccess(`"${p.name}" زبردستی حذف ہو گیا${totalStock>0?" اور بچا ہوا اسٹاک نقصان میں درج ہو گیا":""}۔`);
  }catch(e){ showError("حذف کرتے وقت خرابی: "+e.message); }
}

async function doPurchase(loc, pid, qty){
  qty = Number(qty);
  if(!qty || qty<=0) return showError("تعداد درست درج کریں۔");
  if(!isOnline) return showError("انٹرنیٹ کنکشن نہیں ہے — یہ عمل صرف انٹرنیٹ بحال ہونے پر ممکن ہے (صرف 'سیل' آف لائن کام کرتی ہے)۔");
  const p = productOf(pid);
  if(!p) return showError("پروڈکٹ منتخب کریں۔");
  await stockDelta(loc, pid, qty);
  logTx("purchase", {note:`${p.name} — ${locLabel(loc)} میں ${qty} یونٹ نئی خریداری کے ذریعے شامل`, qty, productId:pid, loc});
  return true;
}

async function doTransfer(from, to, pid, qty){
  qty = Number(qty);
  if(!pid || !productOf(pid)) return showError("پہلے آئٹم منتخب کریں۔");
  if(!qty || qty<=0) return showError("تعداد درست درج کریں۔");
  if(from===to) return showError("فرام اور ٹو ایک جیسی لوکیشن نہیں ہو سکتی۔");
  if(!isOnline) return showError("انٹرنیٹ کنکشن نہیں ہے — یہ عمل صرف انٹرنیٹ بحال ہونے پر ممکن ہے (صرف 'سیل' آف لائن کام کرتی ہے)۔");
  const res1 = await stockDelta(from, pid, -qty);
  if(!res1.committed){
    const avail = res1.snapshot ? (res1.snapshot.val()||0) : 0;
    return showError(`${locLabel(from)} پر "${productOf(pid)?.name}" صرف ${avail} یونٹ موجود ہے، آپ ${qty} یونٹ منتقل کرنا چاہ رہے ہیں۔`);
  }
  await stockDelta(to, pid, qty);
  logTx("transfer", {note:`${productOf(pid).name} — ${locLabel(from)} سے ${locLabel(to)} کو ${qty} یونٹ منتقل`, from, to, productId:pid, qty});
  return true;
}

async function doLoss(loc, pid, qty, reason){
  qty = Number(qty);
  if(!pid || !productOf(pid)) return showError("پہلے آئٹم منتخب کریں۔");
  if(!qty || qty<=0) return showError("تعداد درست درج کریں۔");
  if(!isOnline) return showError("انٹرنیٹ کنکشن نہیں ہے — یہ عمل صرف انٹرنیٹ بحال ہونے پر ممکن ہے (صرف 'سیل' آف لائن کام کرتی ہے)۔");
  const p = productOf(pid);
  const res = await stockDelta(loc, pid, -qty);
  if(!res.committed){
    const avail = res.snapshot ? (res.snapshot.val()||0) : 0;
    return showError(`${locLabel(loc)} پر "${p.name}" صرف ${avail} یونٹ موجود ہے، آپ ${qty} یونٹ کم کرنا چاہ رہے ہیں۔`);
  }
  logTx("loss", {note:`${p.name} — ${locLabel(loc)} پر ${qty} یونٹ کمی (${reason})`, qty, value: round2(qty*p.cost), reason, loc, productId: pid});
  return true;
}

async function isMonthOpen(monthKey){
  const snap = await db.ref("months/"+monthKey+"/status").once("value");
  const status = snap.val();
  return status !== "closed";
}

async function nextInvoiceNumber(){
  const res = await db.ref("meta/invoiceCounter").transaction(cur=>(cur||0)+1);
  return res.snapshot.val();
}
function computeBelowRateItems(items){
  return items
    .map(it=>({it, p:productOf(it.productId)}))
    .filter(({it,p})=> p && it.rate < p.rate)
    .map(({it,p})=>({name:p.name, setRate:p.rate, soldRate:it.rate, qty:it.qty}));
}
async function finalizeBill(pointId, items, customer, originOverride){
  const point = pointOf(pointId);
  if(!point) return showError("سیل پوائنٹ منتخب کریں۔"), false;

  if(!isOnline){
    return finalizeBillOffline(pointId, items, customer, point);
  }

  const open = await isMonthOpen(state.activeMonthKey);
  if(!open){
    showError(`یہ مہینہ (${monthLabelFor(state.activeMonthKey)}) بند ہو چکا ہے — سیل نہیں ہو سکتی۔ پہلے "ماہانہ حساب" ٹیب میں جا کر اس مہینے کو دوبارہ کھولیں، یا نیا مہینہ شروع کریں۔`);
    return false;
  }
  await ensureMonthExists(state.activeMonthKey);
  const committedItems = [];
  for(const it of items){
    const res = await stockDelta(pointId, it.productId, -it.qty);
    if(!res.committed){
      for(const done of committedItems){ await stockDelta(pointId, done.productId, done.qty); }
      showError(`${productOf(it.productId)?.name} کا اسٹاک ${locLabel(pointId)} میں کم ہے — بل منسوخ کیا گیا۔`);
      return false;
    }
    committedItems.push(it);
  }
  let totalAmount=0, fullProfit=0;
  items.forEach(it=>{
    totalAmount += it.qty*it.rate;
    fullProfit += it.qty*(it.rate - (productOf(it.productId)?.cost||0));
  });
  totalAmount = round2(totalAmount); fullProfit = round2(fullProfit);
  // Owner's counted profit/sale is always the FULL amount regardless of cash vs credit —
  // credit risk is the store's own responsibility, not deducted from the owner's totals.
  const share = round2(fullProfit*(point.share/100));
  await pointDelta(state.activeMonthKey, pointId, totalAmount, fullProfit, share);

  let customerId=null, customerName="کیش کاؤنٹر", customerPhone=null, amountPaid=totalAmount, creditAdded=0;
  if(customer && customer.name && customer.name.trim()){
    customerId = await upsertCustomer(pointId, customer.id, customer.name, customer.phone, customer.description);
    customerName = customer.name.trim();
    customerPhone = (customer.phone||"").trim() || null;
    amountPaid = Math.max(0, round2(customer.amountPaid!=null && customer.amountPaid!=="" ? Number(customer.amountPaid) : totalAmount));
    creditAdded = round2(totalAmount - amountPaid);
    if(creditAdded !== 0) await customerBalanceDelta(pointId, customerId, creditAdded);
  }

  const invoiceNo = await nextInvoiceNumber();
  const belowRateItems = computeBelowRateItems(items);

  logTx("sale", {
    note:`${locLabel(pointId)} — بل: ${items.length} ائٹمز${customerId?` — کسٹمر: ${customerName}`:""}`,
    items: items.map(it=>({...it, name: productOf(it.productId)?.name, cost: productOf(it.productId)?.cost ?? 0})),
    totalAmount, fullProfit, yourShare: share, pointId, monthKey: state.activeMonthKey, monthLabel: monthLabelFor(state.activeMonthKey),
    customerId, customerName, customerPhone, amountPaid, creditAdded, invoiceNo,
    belowRateItems: belowRateItems.length ? belowRateItems : null,
    wasOfflineSync: !!originOverride, // permanent marker: this bill was made offline and synced later — its invoiceNo reflects sync order, not the (earlier) time shown above
  }, originOverride);
  return {totalAmount, fullProfit, yourShare: share, customerId, customerName, customerPhone, amountPaid, creditAdded, invoiceNo, belowRateItems};
}

// Offline sale path: we can't safely run a Firebase transaction with no connection, so we
// validate against the last-known LOCAL stock numbers, apply the change directly to `state`
// (optimistic UI), and queue the exact same call to run for real once the connection returns.
// Note: only "سیل" (the most time-critical counter action) gets this treatment — other actions
// (transfer/loss/return/purchase/payment) simply ask the person to wait for the connection,
// since they're rarer and queuing every action type reliably would need much more machinery.
function finalizeBillOffline(pointId, items, customer, point){
  for(const it of items){
    const avail = getQty(pointId, it.productId);
    if(avail < it.qty){
      showError(`${productOf(it.productId)?.name} کا (آخری معلوم) اسٹاک ${locLabel(pointId)} میں صرف ${avail} ہے — بل منسوخ کیا گیا۔`);
      return false;
    }
  }
  let totalAmount=0, fullProfit=0;
  items.forEach(it=>{
    totalAmount += it.qty*it.rate;
    fullProfit += it.qty*(it.rate - (productOf(it.productId)?.cost||0));
  });
  totalAmount = round2(totalAmount); fullProfit = round2(fullProfit);
  const share = round2(fullProfit*(point.share/100));

  // optimistic local mutation
  items.forEach(it=>{ state.stock[pointId] = state.stock[pointId]||{}; state.stock[pointId][it.productId] = (state.stock[pointId][it.productId]||0) - it.qty; });
  state.months[state.activeMonthKey] = state.months[state.activeMonthKey] || {points:{}};
  const mp = state.months[state.activeMonthKey].points[pointId] = state.months[state.activeMonthKey].points[pointId] || {sale:0,profit:0,share:0};
  mp.sale = round2(mp.sale+totalAmount); mp.profit = round2(mp.profit+fullProfit); mp.share = round2(mp.share+share);

  let customerId=customer?.id||null, customerName="کیش کاؤنٹر", customerPhone=null, amountPaid=totalAmount, creditAdded=0;
  if(customer && customer.name && customer.name.trim()){
    customerName = customer.name.trim();
    customerPhone = (customer.phone||"").trim() || null;
    amountPaid = Math.max(0, round2(customer.amountPaid!=null && customer.amountPaid!=="" ? Number(customer.amountPaid) : totalAmount));
    creditAdded = round2(totalAmount - amountPaid);
    // A brand-new customer (no id yet) still needs to be visible locally while offline — give it
    // a temporary id for local bookkeeping only. The real sync later creates the actual Firebase
    // record with its own id; this temporary entry is simply replaced once that arrives.
    if(!customerId) customerId = "offline_cust_"+Date.now();
    state.customers[pointId] = state.customers[pointId]||{};
    state.customers[pointId][customerId] = state.customers[pointId][customerId] || {id:customerId, name:customerName, phone:customerPhone, balance:0};
    state.customers[pointId][customerId].balance = round2((state.customers[pointId][customerId].balance||0) + creditAdded);
  }

  const belowRateItems = computeBelowRateItems(items);
  const opId = "off_"+Date.now()+"_"+Math.floor(Math.random()*10000);
  const localTx = {
    id:"pending_"+opId, pending:true, type:"sale",
    note:`${locLabel(pointId)} — بل: ${items.length} ائٹمز${customerId?` — کسٹمر: ${customerName}`:""} (⏳ آف لائن، سنک باقی)`,
    items: items.map(it=>({...it, name: productOf(it.productId)?.name, cost: productOf(it.productId)?.cost ?? 0})),
    totalAmount, fullProfit, yourShare: share, pointId, monthKey: state.activeMonthKey, monthLabel: monthLabelFor(state.activeMonthKey),
    customerId, customerName, customerPhone, amountPaid, creditAdded, belowRateItems: belowRateItems.length?belowRateItems:null,
    time: nowStr(), ts: new Date().toISOString(), by: currentPerson?currentPerson.name:"نامعلوم",
  };
  const originOverride = {time: localTx.time, ts: localTx.ts};
  pendingOps.push({ id:opId, type:"sale", args:{pointId, items, customer, originOverride}, queuedAt:Date.now(), localTx });
  savePendingOps();
  state.txs.unshift(localTx);
  cacheStateSnapshot();
  render();
  showSuccess("انٹرنیٹ نہیں ہے — بل مقامی طور پر محفوظ ہو گیا، انٹرنیٹ آنے پر خودکار سنک ہو جائے گا۔");
  return {totalAmount, fullProfit, yourShare: share, customerId, customerName, customerPhone, amountPaid, creditAdded, invoiceNo:null, belowRateItems, offline:true};
}

async function doReturn(pointId, pid, qty, rate, link){
  qty = Number(qty);
  if(!pid || !productOf(pid)) return showError("پہلے آئٹم منتخب کریں۔");
  if(!pointOf(pointId)) return showError("سیل پوائنٹ منتخب کریں۔");
  if(!qty || qty<=0) return showError("تعداد درست درج کریں۔");
  if(!isOnline) return showError("انٹرنیٹ کنکشن نہیں ہے — یہ عمل صرف انٹرنیٹ بحال ہونے پر ممکن ہے (صرف 'سیل' آف لائن کام کرتی ہے)۔");
  const open = await isMonthOpen(state.activeMonthKey);
  if(!open){
    showError(`یہ مہینہ (${monthLabelFor(state.activeMonthKey)}) بند ہو چکا ہے — ریٹرن درج نہیں ہو سکتی۔ پہلے اس مہینے کو دوبارہ کھولیں۔`);
    return false;
  }
  const p = productOf(pid);
  const point = pointOf(pointId);
  let costForProfit = p.cost;
  if(link && link.saleTxId){
    // Invoice-linked return: hard limits and exact figures come FROM THAT BILL.
    if(qty > link.maxQty) return showError(`بل نمبر ${link.invoiceNo} میں "${p.name}" کے صرف ${link.maxQty} یونٹ واپسی کے قابل باقی ہیں (بکے ہوئے منفی پہلے ریٹرن شدہ)۔`);
    rate = Number(link.rate);              // the rate it actually sold at on this bill
    costForProfit = Number(link.cost ?? p.cost); // the cost at the time of sale
  } else {
    // Free return (no invoice): soft confirmation against overall recorded sales,
    // because units sold before this system existed have no sale record here.
    const soldQty = state.txs.filter(t=>t.type==="sale" && t.pointId===pointId && t.items)
      .reduce((s,t)=> s + t.items.filter(i=>i.productId===pid).reduce((a,i)=>a+i.qty,0), 0);
    const returnedQty = state.txs.filter(t=>t.type==="return" && t.pointId===pointId && t.productId===pid)
      .reduce((s,t)=> s + (t.qty||0), 0);
    const returnable = Math.max(0, soldQty - returnedQty);
    if(qty > returnable){
      const ok = await askConfirm(`ریکارڈ کے مطابق "${p.name}" کے ${locLabel(pointId)} پر صرف ${returnable} یونٹ ریٹرن ہو سکتے ہیں (بکے ہوئے منفی پہلے ریٹرن شدہ) — آپ ${qty} یونٹ ریٹرن کر رہے ہیں۔ کیا واقعی جاری رکھیں؟ (پرانی، سسٹم سے پہلے کی سیل کی صورت میں 'جی ہاں' دبائیں)`);
      if(!ok) return false;
    }
    rate = Number(rate) || p.rate;
  }
  await ensureMonthExists(state.activeMonthKey);
  const amount = round2(qty*rate);
  const fullProfit = round2(qty*(rate - costForProfit));
  const share = round2(fullProfit*(point.share/100));
  await stockDelta(pointId, pid, qty);
  await pointDelta(state.activeMonthKey, pointId, -amount, -fullProfit, -share);
  // Invoice-linked return + registered customer: the returned value comes OFF his account.
  // Credit owed shrinks first; anything beyond that shows as جمع (advance in his favour),
  // which the owner can pay back from the customers tab.
  let custEffect = null;
  if(link && link.saleTxId){
    const saleTx = state.txs.find(t=>t.id===link.saleTxId);
    if(saleTx && saleTx.customerId){
      await customerBalanceDelta(pointId, saleTx.customerId, -amount);
      custEffect = {custId: saleTx.customerId, customerName: saleTx.customerName || "", balanceDelta: -amount};
    }
  }
  logTx("return", {
    note:`${p.name} — ${locLabel(pointId)} پر ${qty} یونٹ (${rupee(amount)}) واپس آیا${link&&link.invoiceNo?` — بل نمبر ${link.invoiceNo} کے خلاف`:""}${custEffect?` — ${custEffect.customerName} کے کھاتے سے ${rupee(amount)} منہا`:""}`,
    qty, rate, amount, fullProfit, yourShare: share, pointId, productId: pid, monthKey: state.activeMonthKey, monthLabel: monthLabelFor(state.activeMonthKey),
    saleTxId: link?.saleTxId || null, invoiceNo: link?.invoiceNo || null, costUsed: costForProfit,
    custId: custEffect?.custId || null, customerName: custEffect?.customerName || null, balanceDelta: custEffect?.balanceDelta ?? null
  });
  return true;
}

async function closeMonth(monthKey){
  await db.ref("months/"+monthKey+"/status").set("closed");
  await db.ref("months/"+monthKey+"/closedAt").set(dateOnlyStr());
  logTx("close", {note:`${monthLabelFor(monthKey)} کا حساب بند کر دیا گیا`, monthKey});
  if(state.activeMonthKey === monthKey){
    const nk = nextMonthKey(monthKey);
    await ensureMonthExists(nk);
    await db.ref("activeMonthKey").set(nk);
  }
}

async function handleCloseMonthClick(monthKey){
  if(!requireOwner("مہینہ بند کرنا")) return;
  const ok = await askConfirm(`${monthLabelFor(monthKey)} کا حساب بند کر دیں؟`);
  if(ok) await closeMonth(monthKey);
}

async function reopenMonth(monthKey){
  if(!requireOwner("مہینہ دوبارہ کھولنا")) return;
  const previousActiveKey = state.activeMonthKey;
  await db.ref("months/"+monthKey+"/status").set("open");
  await db.ref("activeMonthKey").set(monthKey);
  logTx("reopen", {note:`${monthLabelFor(monthKey)} دوبارہ کھول دیا گیا — نئی انٹریز اسی مہینے میں شامل ہوں گی`, monthKey, previousActiveKey});
}

function monthLabelFor(monthKey){
  if(state.months[monthKey]) return state.months[monthKey].label;
  const {year,month} = parseMonthKey(monthKey);
  return monthLabelOf(year,month);
}

async function renameSellPoint(id, newName, newShare){
  try{
    if(!requireOwner("سیل پوائنٹ کی تفصیل بدلنا")) return;
    const point = pointOf(id);
    if(!point) return showError("یہ سیل پوائنٹ اب موجود نہیں۔");
    newName = (newName||"").trim();
    if(!newName) return showError("نام خالی نہیں ہو سکتا۔");
    newShare = Number(newShare); if(!newShare || newShare<=0 || newShare>100) newShare = point.share;
    const oldName = point.name;
    await db.ref("sellPoints/"+id).update({name:newName, share:newShare});
    logTx("add", {note: oldName!==newName ? `سیل پوائنٹ کا نام بدلا گیا: "${oldName}" سے "${newName}"` : `${newName} کا حصہ اپڈیٹ ہوا: ${newShare}%`});
    render();
    showSuccess("سیل پوائنٹ کی تفصیل محفوظ ہو گئی۔");
  }catch(e){ showError("محفوظ کرتے وقت خرابی: "+e.message); }
}

async function addSellPoint(name, share){
  if(!requireOwner("نیا سیل پوائنٹ شامل کرنا")) return;
  name = (name||"").trim();
  if(!name) return showError("سیل پوائنٹ کا نام لکھیں۔");
  share = Number(share); if(!share || share<=0 || share>100) share = 50;
  const id = db.ref("sellPoints").push().key;
  const updates = {};
  updates["sellPoints/"+id] = {id, name, share};
  state.products.forEach(p=>{ updates["stock/"+id+"/"+p.id] = 0; });
  await db.ref().update(updates);
  logTx("add", {note:`نیا سیل پوائنٹ شامل: ${name} (حصہ ${share}%)`});
}

async function removeSellPoint(id){
  if(!requireOwner("سیل پوائنٹ ہٹانا")) return;
  const point = pointOf(id);
  if(!point) return;
  const stockHere = state.products.reduce((s,p)=>s+getQty(id,p.id),0);
  const msg = stockHere>0
    ? `کیا آپ واقعی "${point.name}" کو ہٹانا چاہتے ہیں؟ اس میں موجود ${stockHere} یونٹس کا مال خودکار طور پر گودام میں واپس منتقل ہو جائے گا۔`
    : `کیا آپ واقعی "${point.name}" کو سیل پوائنٹس کی فہرست سے ہٹانا چاہتے ہیں؟`;
  const ok = await askConfirm(msg);
  if(!ok) return;
  for(const p of state.products){
    const qty = getQty(id, p.id);
    if(qty>0){
      await stockDelta(id, p.id, -qty);
      await stockDelta("godown", p.id, qty);
      logTx("transfer", {note:`${p.name} — ${point.name} ہٹانے کی وجہ سے ${qty} یونٹ خودکار گودام میں منتقل`, from:id, to:"godown", productId:p.id, qty});
    }
  }
  await db.ref("sellPoints/"+id).remove();
  await db.ref("stock/"+id).remove();
  logTx("delete", {note:`سیل پوائنٹ ہٹا دیا گیا: ${point.name}`});
}

function toggleRestock(id){ const r=state.restock.find(x=>x.id===id); if(r) db.ref("restock/"+id+"/done").set(!r.done); }
function removeRestock(id){ db.ref("restock/"+id).remove(); }
function addRestock(productId, customName, note){
  let name, pid = null;
  if(productId==="__other__"){ name = (customName||"").trim(); if(!name) return; }
  else { const p = productOf(productId); if(!p) return; name = p.name; pid = productId; }
  note = (note||"").trim();
  // Guards against accidental double-taps (or slow network round-trips) creating duplicate
  // pending entries for the exact same item.
  const dup = state.restock.some(r=>!r.done && r.name.trim().toLowerCase()===name.toLowerCase() && (r.note||"")===note);
  if(dup) return showError(`"${name}" پہلے سے ہی منگوانے کی لسٹ میں شامل ہے۔`);
  const id = db.ref("restock").push().key;
  db.ref("restock/"+id).set({id, name, productId: pid, note, done:false});
}

// Tracks which products we've already pushed an auto-suggestion for THIS session, independent
// of `state.restock` — the stock listener can fire several times in quick succession (e.g. during
// the initial data import), and without this, each firing would push ANOTHER duplicate entry
// before Firebase's round-trip had a chance to update `state.restock` and make the "already
// pending" check see it.
const autoSuggestedThisSession = new Set();
function autoSuggestRestock(){
  activeProducts().forEach(p=>{
    const qty = getQty("godown", p.id);
    if(qty <= lowStockOf(p)){
      const alreadyPending = state.restock.some(r=>r.productId===p.id && !r.done);
      if(!alreadyPending && !autoSuggestedThisSession.has(p.id)){
        autoSuggestedThisSession.add(p.id);
        const id = db.ref("restock").push().key;
        db.ref("restock/"+id).set({id, name:p.name, productId:p.id, note:"خودکار تجویز — گودام میں کم اسٹاک", done:false, auto:true});
      }
    } else {
      autoSuggestedThisSession.delete(p.id); // stock recovered — allow re-suggesting if it drops low again later
    }
  });
}

/* ====================== TRANSFER SUMMARY FOR A GIVEN MONTH ====================== */
/* ====================== DETAILED REPORTS: DATA + PDF/EXCEL/WHATSAPP EXPORT ====================== */
function txBelongsToMonth(t, monthKey){
  // Sales/returns carry the ledger monthKey they were actually counted in — matching on it
  // keeps the item-wise report consistent with the monthly totals even when a month was
  // reopened or closed late. Entries without a monthKey fall back to the calendar date.
  if(t.monthKey) return t.monthKey === monthKey;
  if(!t.ts) return false;
  const d = new Date(t.ts);
  const {year, month} = parseMonthKey(monthKey);
  return d.getFullYear()===year && d.getMonth()===month;
}
function buildMonthlyItemizedReport(monthKey){
  const relevantTxs = state.txs.filter(t=>txBelongsToMonth(t, monthKey));
  const report = {};
  state.sellPoints.forEach(sp=>{ report[sp.id] = {sales:{}, returns:{}, totalSale:0, totalProfit:0, yourShare:0}; });
  relevantTxs.forEach(t=>{
    if(t.type==="sale" && t.items && report[t.pointId]){
      const r = report[t.pointId];
      t.items.forEach(it=>{
        if(!r.sales[it.productId]) r.sales[it.productId] = {qty:0, amount:0};
        r.sales[it.productId].qty += it.qty;
        r.sales[it.productId].amount += it.qty*it.rate;
      });
      r.totalSale += t.totalAmount||0;
      r.totalProfit += t.fullProfit||0;
      r.yourShare += t.yourShare||0;
    }
    if(t.type==="return" && t.productId && report[t.pointId]){
      const r = report[t.pointId];
      if(!r.returns[t.productId]) r.returns[t.productId] = {qty:0, amount:0};
      r.returns[t.productId].qty += t.qty;
      r.returns[t.productId].amount += t.amount||0;
      r.totalSale -= t.amount||0;
      r.totalProfit -= t.fullProfit||0;
      r.yourShare -= t.yourShare||0;
    }
  });
  return report;
}

// Renders each direct ".pdf-section" child of #containerId to its own high-resolution canvas and
// places it on the PDF as a whole block. Page breaks only ever happen BETWEEN sections (e.g.
// between one sell-point's block and the next), never through the middle of a table's rows —
// which is what caused data to look "cut off" with the old single-giant-image slicing approach.
// A section is only pixel-sliced (as a last resort) if it alone is taller than a full page.
async function generateSectionedPDF(containerId, filename){
  if(typeof html2canvas === "undefined" || typeof window.jspdf === "undefined"){
    showError("PDF بنانے کی سہولت لوڈ نہیں ہو سکی — انٹرنیٹ کنکشن چیک کریں۔");
    return null;
  }
  const container = document.getElementById(containerId);
  const sections = container ? Array.from(container.children).filter(el=>el.classList.contains("pdf-section")) : [];
  if(sections.length===0) return null;
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({orientation:"p", unit:"pt", format:"a4"});
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const margin = 20;
  const usableWidth = pageWidth - margin*2;
  const usableHeight = pageHeight - margin*2;
  let y = margin;
  let placedAnything = false;

  for(const sec of sections){
    const canvas = await html2canvas(sec, {scale:3, backgroundColor:"#F7F2E7"});
    const imgWidth = usableWidth;
    const imgHeight = canvas.height * (imgWidth/canvas.width);

    if(imgHeight > usableHeight){
      // Rare case: a single section alone is taller than one page — slice just this section,
      // cropping the source canvas cleanly at pixel boundaries rather than repositioning one
      // big image with fixed offsets (which is what produced cut-off rows before).
      if(placedAnything) pdf.addPage();
      const pxPerPt = canvas.width / imgWidth;
      let sy = 0, remaining = canvas.height;
      let first = true;
      while(remaining > 0){
        if(!first) pdf.addPage();
        first = false;
        const sliceHeightPx = Math.min(remaining, usableHeight * pxPerPt);
        const sliceCanvas = document.createElement("canvas");
        sliceCanvas.width = canvas.width;
        sliceCanvas.height = sliceHeightPx;
        sliceCanvas.getContext("2d").drawImage(canvas, 0, sy, canvas.width, sliceHeightPx, 0, 0, canvas.width, sliceHeightPx);
        pdf.addImage(sliceCanvas.toDataURL("image/png"), "PNG", margin, margin, imgWidth, sliceHeightPx/pxPerPt);
        sy += sliceHeightPx;
        remaining -= sliceHeightPx;
      }
      y = pageHeight; // force the next section onto a fresh page
    } else {
      if(y + imgHeight > pageHeight - margin){
        pdf.addPage();
        y = margin;
      }
      pdf.addImage(canvas.toDataURL("image/png"), "PNG", margin, y, imgWidth, imgHeight);
      y += imgHeight + 12;
    }
    placedAnything = true;
  }
  pdf.save(filename);
  return true;
}

function generateReportExcel(filename, sheetName, rows, opts={}){
  if(typeof XLSX === "undefined"){
    showError("Excel بنانے کی سہولت لوڈ نہیں ہو سکی — انٹرنیٹ کنکشن چیک کریں۔");
    return null;
  }
  const colCount = rows[0] ? rows[0].length : 1;
  // Title row above the header, then a blank spacer row, so the sheet reads clearly
  // without needing to widen/double-click columns to see what's in them.
  const finalRows = opts.title
    ? [[opts.title], Array(colCount).fill(""), ...rows]
    : rows;
  const ws = XLSX.utils.aoa_to_sheet(finalRows);
  ws["!cols"] = opts.colWidths || Array.from({length:colCount}, ()=>({wch:20}));
  const headerRowIdx = opts.title ? 3 : 1; // 1-based row number of the actual column-header row
  if(opts.title){
    ws["!merges"] = [{ s:{r:0,c:0}, e:{r:0,c:colCount-1} }];
  }
  // Freeze the header row so it stays visible while scrolling a long report.
  ws["!views"] = [{ state:"frozen", ySplit: headerRowIdx, topLeftCell:`A${headerRowIdx+1}`, activePane:"bottomLeft" }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName.slice(0,31));
  XLSX.writeFile(wb, filename);
  return true;
}

    Object.entries(r.returns).forEach(([pid,v])=>rows.push([sp.name,"ریٹرن",productOf(pid)?.name||"(حذف شدہ)",v.qty,v.amount]));

function transfersInMonth(monthKey){
  const {year,month} = parseMonthKey(monthKey);
  const rel = state.txs.filter(t=>{
    if(t.type!=="transfer" || !t.ts) return false;
    const d = new Date(t.ts);
    return d.getFullYear()===year && d.getMonth()===month;
  });
  const byRoute = {};
  rel.forEach(t=>{
    const key = t.from+"→"+t.to;
    if(!byRoute[key]) byRoute[key] = {from:t.from, to:t.to, items:{}};
    if(!byRoute[key].items[t.productId]) byRoute[key].items[t.productId]=0;
    byRoute[key].items[t.productId]+=t.qty;
  });
  return byRoute;
}

/* ====================== PRODUCT LIST: SWIPE-TO-DELETE ====================== */
function wireProductSwipeRows(){
  const SWIPE_OPEN_PX = 112; // matches .prod-row-delete button width so the whole button is revealed
  document.querySelectorAll(".prod-row").forEach(row=>{
    let startX = 0, dx = 0, dragging = false, opened = row.dataset.opened === "1";
    row.style.transform = opened ? `translateX(-${SWIPE_OPEN_PX}px)` : "translateX(0)";
    row.addEventListener("pointerdown", e=>{
      if(e.target.closest("input,select,button")) return; // don't hijack taps on the low-stock input etc.
      dragging = true; startX = e.clientX; dx = opened ? -SWIPE_OPEN_PX : 0;
      row.style.transition = "none";
      try{ row.setPointerCapture(e.pointerId); }catch(err){}
    });
    row.addEventListener("pointermove", e=>{
      if(!dragging) return;
      dx = (e.clientX - startX) + (opened ? -SWIPE_OPEN_PX : 0);
      if(dx > 0) dx = 0;
      if(dx < -SWIPE_OPEN_PX) dx = -SWIPE_OPEN_PX;
      row.style.transform = `translateX(${dx}px)`;
    });
    function endDrag(){
      if(!dragging) return;
      dragging = false;
      row.style.transition = "transform .18s ease";
      opened = dx < -(SWIPE_OPEN_PX/2);
      row.dataset.opened = opened ? "1" : "0";
      row.style.transform = opened ? `translateX(-${SWIPE_OPEN_PX}px)` : "translateX(0)";
    }
    row.addEventListener("pointerup", endDrag);
    row.addEventListener("pointercancel", endDrag);
    row.addEventListener("pointerleave", e=>{ if(dragging && e.buttons===0) endDrag(); });
  });
}

/* ====================== DASHBOARD ====================== */
function renderDashboard(){
  const am = state.months[state.activeMonthKey] || {points:{}};
  const scopedPointIds = visiblePoints().map(p=>p.id);
  const scopedEntries = Object.entries(am.points||{}).filter(([id])=>scopedPointIds.includes(id));
  const totalMonthSales = scopedEntries.reduce((s,[,x])=>s+(x.sale||0),0);
  const totalMonthProfit = scopedEntries.reduce((s,[,x])=>s+(x.share||0),0);

  const today = new Date();
  const isToday = (t)=>{ if(!t.ts) return false; const d=new Date(t.ts); return d.getFullYear()===today.getFullYear() && d.getMonth()===today.getMonth() && d.getDate()===today.getDate(); };
  const todaySales = state.txs.filter(t=> t.type==="sale" && isLocVisible(t.pointId) && isToday(t));
  // Returns must reduce today's figure — the monthly ledger already subtracts them,
  // so the dashboard shows the same net number instead of a misleading gross.
  const todayReturns = state.txs.filter(t=> t.type==="return" && isLocVisible(t.pointId) && isToday(t));
  const todayReturnAmount = todayReturns.reduce((s,t)=>s+(t.amount||0),0);
  const todayCount = todaySales.length;
  const todayAmount = todaySales.reduce((s,t)=>s+(t.totalAmount||0),0) - todayReturnAmount;

  let totalInvestment = 0;
  const investRows = activeProducts().map(p=>{
    const totalQty = visibleLocs().reduce((s,l)=>s+getQty(l.id,p.id),0);
    const invested = totalQty*p.cost;
    totalInvestment += invested;
    return {p, totalQty, invested};
  });

  const lowStockRows = [];
  visibleLocs().forEach(loc=>{
    activeProducts().forEach(p=>{
      const qty = getQty(loc.id, p.id);
      if(qty <= lowStockOf(p)) lowStockRows.push({loc, p, qty});
    });
  });

  let html = `<div class="row" style="margin-bottom:12px;">
    <div class="card kpi"><div class="lbl">اس مہینے کی سیل (${esc(monthLabelFor(state.activeMonthKey))})</div><div class="big">${rupee(totalMonthSales)}</div></div>
    <div class="card kpi"><div class="lbl">اس مہینے کا نفع (آپ کا حصہ)</div><div class="big" style="color:var(--green)">${rupee(totalMonthProfit)}</div></div>
    <div class="card kpi"><div class="lbl">کل انویسٹمنٹ (موجودہ اسٹاک کی مالیت)</div><div class="big" style="color:var(--purple)">${rupee(totalInvestment)}</div></div>
    <div class="card kpi"><div class="lbl">آج کی سیل</div><div class="big" style="color:var(--gold)">${rupee(todayAmount)}</div><div class="muted" style="font-size:11.5px;">${todayCount} بل${todayReturns.length?` — ${todayReturns.length} ریٹرن (−${rupee(todayReturnAmount)})`:""}</div></div>
  </div>`;

  html += `<div class="card" style="border:2px solid var(--red);">
    <h3 style="color:var(--red);">⚠️ توجہ درکار — کم اسٹاک والے آئٹمز (${lowStockRows.length})</h3>`;
  if(lowStockRows.length===0){
    html += `<div class="muted">فی الحال کوئی آئٹم کم اسٹاک کی حد پر نہیں — بہت خوب!</div>`;
  } else {
    html += `<table dir="ltr" style="text-align:right;"><thead><tr><th style="text-align:left;">آئٹم</th><th>لوکیشن</th><th>موجودہ تعداد</th><th>الرٹ حد</th></tr></thead><tbody>`;
    lowStockRows.forEach(r=>{
      html += `<tr><td style="text-align:left;direction:ltr;">${esc(r.p.name)}</td><td>${esc(r.loc.label)}</td><td style="color:var(--red);font-weight:700;">${r.qty}</td><td>${lowStockOf(r.p)}</td></tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;

  html += `<div class="grid">`;
  visibleLocs().forEach(loc=>{
    html += `<div class="card"><h3>${esc(loc.label)}${pointOf(loc.id)?` <span class="stamp" style="border-color:var(--purple);color:var(--purple);float:left">حصہ ${pointOf(loc.id).share}%</span>`:""}</h3>`;
    activeProducts().forEach(p=>{
      const qty = getQty(loc.id, p.id); const low = qty<=lowStockOf(p);
      html += `<div class="rowline">
        <span style="text-align:left;direction:ltr;">${esc(p.name)}<br><span class="muted" style="font-size:11px;">خرید ${rupee(p.cost)} — سیل ${rupee(p.rate)}</span></span>
        ${low?`<span class="stamp" style="border-color:var(--red);color:var(--red)">کم اسٹاک: ${qty}</span>`:`<span style="font-weight:700;color:var(--green)">${qty}</span>`}
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  html += `<div class="card"><h3>انویسٹمنٹ کی تفصیل (فی آئٹم)</h3>
    <table><thead><tr><th style="text-align:left;">آئٹم</th><th>کل تعداد (ہر جگہ)</th><th>خرید ریٹ</th><th>انویسٹ شدہ رقم</th></tr></thead><tbody>`;
  investRows.forEach(r=>{
    html += `<tr><td style="text-align:left;direction:ltr;">${esc(r.p.name)}</td><td>${r.totalQty}</td><td>${rupee(r.p.cost)}</td><td>${rupee(r.invested)}</td></tr>`;
  });
  html += `</tbody></table>
    <div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:2px dashed var(--line);">
      <b>مجموعی انویسٹمنٹ</b><b style="color:var(--purple);font-size:18px;">${rupee(totalInvestment)}</b>
    </div>
  </div>`;
  return html;
}

/* ====================== TRANSFER ====================== */
function normalizeUrdu(s){
  // Unifies alef variants (آ/أ/إ -> ا), strips diacritics and spaces, so text matching survives
  // small spelling differences (e.g. "اے آر" vs "اے ار") — this is what makes the AR-point
  // detection below survive the user renaming sell points later.
  return String(s||"")
    .replace(/[\u064B-\u065F\u0670]/g, "")
    .replace(/[أإآ]/g, "ا")
    .replace(/\s+/g, "")
    .toLowerCase();
}
function renderTransfer(){
  const locs = visibleLocs();
  const optsWithDefault = (a, defaultId) => a.map(l=>`<option value="${l.id}" ${l.id===defaultId?"selected":""}>${esc(l.label)}</option>`).join("");
  // Default "to" should be whichever sell point is CURRENTLY named "AR" — matched by normalized
  // name text (not a hardcoded id), so renaming sell points in "اسٹور مینجمنٹ" correctly updates
  // this default too, instead of it staying stuck on whatever id used to mean "AR". A staff
  // account scoped to a single store just defaults to that one store instead.
  const arTarget = normalizeUrdu("اے آر");
  const vp = visiblePoints();
  const arPoint = vp.length===1 ? vp[0] : (vp.find(p=>normalizeUrdu(p.name).includes(arTarget)) || vp[1] || vp[0]);

function updateTransferAvail(){

  el.innerHTML = `<b>${esc(locLabel(from))}</b> میں اس وقت <b style="color:${qty<=lowStockOf(p)?'var(--red)':'var(--green)'};font-size:15px;">${qty}</b> عدد "${esc(p?.name||"")}" موجود ہے`;

/* ====================== RESTOCK LIST (dropdown-based) ====================== */
let restockShowManual = true;
let restockShowAuto = true;
// Shared by the on-screen list AND all three exports so they always agree: manually-added
// items first, then auto-suggested ones — filtered by whichever of the two checkboxes are on.
function getFilteredPendingRestock(){
  const pending = state.restock.filter(r=>!r.done);
  const manual = pending.filter(r=>!r.auto);
  const auto = pending.filter(r=>r.auto);
  let result = [];
  if(restockShowManual) result = result.concat(manual);
  if(restockShowAuto) result = result.concat(auto);
  return result;
}
function restockQtyLabel(r){ return r.productId!=null ? String(getQty("godown", r.productId)) : "—"; }

function buildRestockText(){
  const pending = getFilteredPendingRestock();

  if(pending.length===0){ text += "فہرست خالی ہے۔\n"; }
  else pending.forEach((r,i)=>{ text += `${i+1}. ${r.name}${r.note?` — ${r.note}`:""} — موجودہ: ${restockQtyLabel(r)}\n`; });
  return text;
}
function shareRestockText(){ openWhatsAppGeneric(buildRestockText()); }

function renderRestockImage(){
  const pending = getFilteredPendingRestock();
  const el = document.getElementById("reportImageTemplate");
  const C_paper="#F7F2E7", C_card="#FFFDF7", C_ink="#1E3A52", C_gold="#C89A2E", C_line="#DCD3BC", C_text="#2B2620", C_muted="#6B6250";
  // Small chunk size is deliberate: at html2canvas scale:3, a chunk any bigger than this can
  // render TALLER than one PDF page, which forces generateSectionedPDF into its raw pixel-slice
  // fallback — and slicing mid-list can cut an item's row in half across a page break. Keeping
  // chunks small means every section reliably fits on one page, so breaks only ever land
  // between whole items, never through one.
  const CHUNK = 6;
  const chunks = [];
  for(let i=0;i<pending.length;i+=CHUNK) chunks.push(pending.slice(i, i+CHUNK));
  const itemHtml = (r, globalIdx) => `<div style="display:flex;align-items:flex-start;gap:10px;padding:11px 6px;border-bottom:1px dashed ${C_line};">
    <span style="font-size:19px;line-height:1;">☐</span>
    <div style="flex:1;">
      <div style="font-size:14.5px;font-weight:700;color:${C_text};">${globalIdx+1}. ${esc(r.name)}${r.auto?` <span style="font-size:10.5px;color:${C_muted};font-weight:400;">(خودکار)</span>`:""}</div>
      ${r.note?`<div style="font-size:12px;color:${C_muted};margin-top:2px;">${esc(r.note)}</div>`:""}
    </div>
    <div style="font-size:12.5px;color:${C_ink};font-weight:700;white-space:nowrap;">موجودہ: ${restockQtyLabel(r)}</div>
  </div>`;
  let sectionsHtml = `<div class="pdf-section" style="width:480px;background:${C_paper};font-family:'Segoe UI',Tahoma,Arial,sans-serif;padding:18px 18px 4px;" dir="rtl">
    <div style="text-align:center;background:${C_ink};color:${C_gold};padding:16px;border-radius:10px;font-size:19px;font-weight:800;">العمار انٹرپرائزز<br><span style="font-size:13px;color:#fff;">ری اسٹاک لسٹ — خریداری کے لیے</span></div>
    <div style="text-align:center;margin-top:8px;font-size:12.5px;color:${C_muted};">${dateOnlyStr()} — کل ${pending.length} آئٹمز</div>
  </div>`;
  if(pending.length===0){
    sectionsHtml += `<div class="pdf-section" style="width:480px;background:${C_card};border:1px solid ${C_line};border-radius:8px;padding:24px;text-align:center;color:${C_muted};font-family:'Segoe UI',Tahoma,Arial,sans-serif;">فہرست خالی ہے</div>`;
  } else {
    let idx = 0;
    chunks.forEach(chunk=>{
      sectionsHtml += `<div class="pdf-section" style="width:480px;background:${C_card};border:1px solid ${C_line};border-radius:8px;padding:4px 14px;font-family:'Segoe UI',Tahoma,Arial,sans-serif;" dir="rtl">
        ${chunk.map(r=>itemHtml(r, idx++)).join("")}
      </div>`;
    });
  }
  el.innerHTML = `<div id="reportImageInner">${sectionsHtml}</div>`;
}
async function downloadRestockPDF(){
  renderRestockImage();
  await generateSectionedPDF("reportImageInner", `restock-list-${dateOnlyStr().replace(/\s+/g,'-')}.pdf`);
}
function downloadRestockExcel(){
  const pending = getFilteredPendingRestock();

  generateReportExcel(`restock-list-${dateOnlyStr().replace(/\s+/g,'-')}.xlsx`, "ری اسٹاک لسٹ", rows, {
    colWidths: [{wch:6},{wch:36},{wch:26},{wch:14}],
    title: `العمار انٹرپرائزز — ری اسٹاک لسٹ — ${dateOnlyStr()}`,
  });
}

        document.getElementById('pp-name').value=''; document.getElementById('pp-pin').value='';">+ عملہ شامل کریں</button>
    </div>`:""}

async function addPerson(name, pin, role, pointId){
  if(!requireOwner("نیا عملہ شامل کرنا")) return;
  name = (name||"").trim();
  pin = (pin||"").trim();
  if(!name) return showError("نام لکھیں۔");
  if(!/^[0-9]{4,8}$/.test(pin)) return showError("پن 4 سے 8 ہندسوں کا ہونا چاہیے۔");
  if(state.people.some(p=>p.pin===pin)) return showError("یہ پن پہلے سے استعمال ہو رہا ہے — دوسرا پن منتخب کریں۔");
  const id = db.ref("people").push().key;
  await db.ref("people/"+id).set({id, name, pin, role: role==="owner"?"owner":"staff", pointId: pointId||null});
  showSuccess(`"${name}" کو عملے میں شامل کر دیا گیا۔`);
}
async function removePerson(id){
  if(!requireOwner("عملہ ہٹانا")) return;
  const p = personOf(id);
  if(!p) return;
  if(state.people.length<=1) return showError("کم از کم ایک لاگ ان ضروری ہے۔");
  const ok = await askConfirm(`کیا آپ واقعی "${p.name}" کا لاگ ان ہٹانا چاہتے ہیں؟`);
  if(!ok) return;
  await db.ref("people/"+id).remove();
  if(currentPerson && currentPerson.id===id) logoutPerson();
  showSuccess(`"${p.name}" ہٹا دیا گیا۔`);
}

async function resetAllLocationsStock(){
  if(!requireOwner("اسٹاک ری سیٹ کرنا")) return;
  const locs = allLocs();
  const ok = await askConfirm(`⚠️ کیا آپ واقعی ہر لوکیشن (${locs.map(l=>l.label).join("، ")}) کا مکمل اسٹاک 0 پر ری سیٹ کرنا چاہتے ہیں؟ آئٹمز کے نام/قیمتیں محفوظ رہیں گی، صرف ہر جگہ کی تعداد صفر ہو جائے گی۔ لاگ سے یہ انٹری ڈیلیٹ کر کے واپس بحال کیا جا سکتا ہے۔`);
  if(!ok) return;
  // Snapshot every non-zero quantity before zeroing, so deleting this log entry later can put
  // it all back exactly as it was — matching what the "ڈیلیٹ" confirmation already promises.
  const beforeStockAll = {};
  locs.forEach(l=>{
    const perLoc = {};
    state.products.forEach(p=>{ const q = getQty(l.id, p.id); if(q>0) perLoc[p.id] = q; });
    if(Object.keys(perLoc).length) beforeStockAll[l.id] = perLoc;
  });
  const updates = {};
  state.products.forEach(p=>{ locs.forEach(l=>{ updates["stock/"+l.id+"/"+p.id] = 0; }); });
  await db.ref().update(updates);
  logTx("delete", {note:"⚠️ ری سیٹ: تمام لوکیشنز کا مکمل اسٹاک صفر کر دیا گیا", resetType:"allLocations", beforeStockAll});
  showSuccess("تمام لوکیشنز کا اسٹاک ری سیٹ ہو گیا۔");
}

async function resetLocationStock(locId){
  if(!requireOwner("اسٹاک ری سیٹ کرنا")) return;
  if(!locId) return showError("لوکیشن منتخب کریں۔");
  const ok = await askConfirm(`⚠️ کیا آپ واقعی "${locLabel(locId)}" کا مکمل اسٹاک 0 پر ری سیٹ کرنا چاہتے ہیں؟ ہر پروڈکٹ کی تعداد وہاں صفر ہو جائے گی۔ لاگ سے یہ انٹری ڈیلیٹ کر کے واپس بحال کیا جا سکتا ہے۔`);
  if(!ok) return;
  const beforeStock = {};
  state.products.forEach(p=>{ const q = getQty(locId, p.id); if(q>0) beforeStock[p.id] = q; });
  const updates = {};
  state.products.forEach(p=>{ updates["stock/"+locId+"/"+p.id] = 0; });

}

async function fullSoftwareReset(){
  if(!requireOwner("مکمل سافٹ ویئر ری سیٹ")) return;
  const typed = (document.getElementById("full-reset-confirm-text")?.value||"").trim();
  if(typed !== "RESET") return showError('تصدیق کے لیے بالکل "RESET" (بڑے انگریزی حروف میں) لکھیں۔');
  const ok = await askConfirm("☠️ آخری بار پوچھ رہا ہوں — کیا آپ واقعی پورا سافٹ ویئر ری سیٹ کرنا چاہتے ہیں؟ تمام پروڈکٹس، اسٹاک، کسٹمرز، ری اسٹاک لسٹ، ماہانہ حساب اور لاگ ہمیشہ کے لیے ختم ہو جائیں گے۔ یہ واپس نہیں ہو سکتا۔");
  if(!ok) return;
  const now = new Date();
  const key = currentRealMonthKey();
  const points = {};
  state.sellPoints.forEach(p=>{ points[p.id] = {sale:0,profit:0,share:0}; });
  const stockReset = {godown:{}};
  state.sellPoints.forEach(sp=>{ stockReset[sp.id] = {}; });
  await db.ref("products").set(null);
  await db.ref("stock").set(stockReset);
  await db.ref("customers").set(null);
  await db.ref("restock").set(null);
  await db.ref("txs").set(null);
  await db.ref("months").set({ [key]: {year:now.getFullYear(), month:now.getMonth(), label: monthLabelOf(now.getFullYear(), now.getMonth()), status:"open", points} });
  await db.ref("activeMonthKey").set(key);
  await db.ref("meta/invoiceCounter").set(0);
  showSuccess("پورا سافٹ ویئر ری سیٹ ہو گیا۔");
  currentTab = "dashboard";
  render();
}

      const stockHere = allLocs().reduce((s,l)=>s+getQty(l.id,p.id),0);
      html += `<div style="padding:10px 0;border-bottom:1px dashed var(--line);">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="text-decoration:line-through;flex:1;">${esc(p.name)}</span>
          ${stockHere>0?`<span class="stamp" style="border-color:var(--gold);color:var(--gold);">اسٹاک: ${stockHere}</span>`:""}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn-ghost" onclick="restoreProduct('${p.id}');">↩️ بحال کریں</button>
          <button class="btn-ghost" style="color:var(--red);border-color:var(--red);" onclick="permanentlyDeleteProduct('${p.id}');">🗑 حذف کریں</button>
          <button class="btn-ghost" style="color:#fff;background:var(--red);border-color:var(--red);" onclick="forceDeleteProduct('${p.id}');">⚠️ زبردستی حذف کریں</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}

function updateDueDisplay(){
  if(!selectedCustomer) return;
  const totalAmount = currentBillTotalAmount();
  const paidInput = document.getElementById("pay-amount");
  if(paidInput) paidInput.placeholder = totalAmount; // just a suggestion, never overwrites what the user typed
  const paid = (paidInput && paidInput.value!=="") ? Number(paidInput.value) : totalAmount;
  const due = Math.max(0, totalAmount - paid);
  const el = document.getElementById("due-display");
  if(el) el.innerHTML = due>0
    ? `<span style="color:var(--red);">بقایا (نیا ادھار): <b>${rupee(due)}</b> — نیا مجموعی بقایا: <b>${rupee((selectedCustomer.balance||0)+due)}</b></span>`
    : (paid>totalAmount
        ? `<span style="color:var(--green);">مکمل ادائیگی — ${rupee(paid-totalAmount)} اضافی جمع ہو گا</span>`

function renderLossReportImage(){
  const allLosses = state.txs.filter(t=>t.type==="loss" && isLocVisible(t.loc));
  const losses = lossReportLoc==="__all__" ? allLosses : allLosses.filter(t=>t.loc===lossReportLoc);
  const totalValue = losses.reduce((s,t)=>s+(t.value||0),0);
  const totalQty = losses.reduce((s,t)=>s+(t.qty||0),0);
  const scopeLabel = lossReportLoc==="__all__" ? "کل نقصان (تمام لوکیشنز)" : locLabel(lossReportLoc);
  const el = document.getElementById("reportImageTemplate");
  const C_paper="#F7F2E7", C_card="#FFFDF7", C_ink="#1E3A52", C_gold="#C89A2E", C_red="#A8402E", C_line="#DCD3BC", C_text="#2B2620", C_muted="#6B6250";

  // Split into chunks of rows so no single PDF section (and therefore no single canvas) grows
  // too tall — this keeps each section comfortably within one page.
  const CHUNK = 22;
  const chunks = [];
  for(let i=0;i<losses.length;i+=CHUNK) chunks.push(losses.slice(i, i+CHUNK));
  if(chunks.length===0) chunks.push([]);

  const rowsHtml = rowsChunk => rowsChunk.map((t,i)=>`<tr style="background:${i%2===0?C_card:C_paper};">
    <td style="padding:8px 7px;font-size:11.5px;color:${C_muted};">${esc(t.time)}</td>
    <td style="padding:8px 7px;font-size:12px;">${esc(t.note)}</td>
    <td style="padding:8px 7px;"><span style="border:1.5px solid ${C_red};color:${C_red};border-radius:6px;padding:1px 8px;font-size:11px;font-weight:700;">${esc(t.reason)}</span></td>
    <td style="padding:8px 7px;text-align:left;direction:ltr;color:${C_red};font-weight:800;">Rs. ${(t.value||0).toLocaleString("en-PK")}</td>
  </tr>`).join("");

  const tableHead = `<thead><tr style="background:${C_ink};"><th style="text-align:right;padding:8px 7px;color:${C_gold};font-size:11.5px;">تاریخ</th><th style="text-align:right;padding:8px 7px;color:${C_gold};font-size:11.5px;">تفصیل</th><th style="text-align:right;padding:8px 7px;color:${C_gold};font-size:11.5px;">وجہ</th><th style="text-align:left;padding:8px 7px;color:${C_gold};font-size:11.5px;">مالیت</th></tr></thead>`;

  let sectionsHtml = `<div class="pdf-section" style="width:480px;background:${C_paper};font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:${C_text};padding:18px 18px 4px;" dir="rtl">
    <div style="text-align:center;background:${C_ink};color:${C_gold};padding:16px;border-radius:10px;font-size:19px;font-weight:800;">العمار انٹرپرائزز<br><span style="font-size:13px;color:#fff;">ڈسکریپنسی رپورٹ — ${esc(scopeLabel)}</span></div>
    <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:13.5px;background:${C_card};border:1px solid ${C_line};border-radius:8px;padding:10px 14px;">
      <span>کل کھوئی ہوئی تعداد: <b>${totalQty}</b></span>
      <span style="color:${C_red};">مجموعی مالیت: <b>Rs. ${totalValue.toLocaleString("en-PK")}</b></span>
    </div>
  </div>`;

  if(losses.length===0){
    sectionsHtml += `<div class="pdf-section" style="width:480px;background:${C_card};border:1px solid ${C_line};border-radius:8px;padding:20px;font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:${C_muted};text-align:center;" dir="rtl">کوئی نقصان درج نہیں</div>`;
  } else {
    chunks.forEach(chunk=>{
      sectionsHtml += `<div class="pdf-section" style="width:480px;background:${C_card};border:1px solid ${C_line};border-radius:8px;padding:6px;font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:${C_text};overflow:hidden;" dir="rtl">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">${tableHead}<tbody>${rowsHtml(chunk)}</tbody></table>
      </div>`;
    });
  }

  el.innerHTML = `<div id="reportImageInner">${sectionsHtml}</div>`;
}

    results.innerHTML = matches.map(p=>`<div style="padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--line);font-size:13.5px;text-align:left;direction:ltr;" onmousedown="selectBillItem(${idx}, '${p.id}')">${esc(p.name)}</div>`).join("");
  }
  results.style.display = "block";
}
function scanItemIntoBill(){
  openBarcodeScanner(code=>{
    const p = findProductByBarcode(code);
    if(!p) return showError(`اس بارکوڈ (${code}) پر کوئی پروڈکٹ محفوظ نہیں — "پروڈکٹس" ٹیب میں جا کر پہلے یہ بارکوڈ کسی پروڈکٹ سے جوڑیں۔`);
    // same item scanned again -> just bump its quantity (classic POS behavior)
    const existing = billRows.findIndex(r=>r.productId===p.id);
    if(existing>=0){
      billRows[existing].qty = (Number(billRows[existing].qty)||0) + 1;
    } else {
      const emptyIdx = billRows.findIndex(r=>!r.productId);
      const row = {productId: p.id, qty: 1, rate: p.rate||0};
      if(emptyIdx>=0) billRows[emptyIdx] = row;
      else billRows.push(row);
    }
    renderBillRows();
    showSuccess(`"${p.name}" بل میں شامل ہو گیا۔`);
  });
}
function selectBillItem(idx, productId){
  const p = productOf(productId);
  billRows[idx].productId = productId;
  billRows[idx].rate = p?.rate || 0;
  renderBillRows();
}
function clearBillItem(idx){
  billRows[idx].productId = "";
  billRows[idx].qty = "";
  billRows[idx].rate = 0;
  renderBillRows();
}
function onBillQtyRateChange(e){
  // Used for qty/rate number inputs — update state + just the derived spans, never touch the input DOM itself.
  // This keeps the input focused so the mobile number pad doesn't close after each digit.
  const idx = Number(e.target.dataset.idx), field = e.target.dataset.field;
  billRows[idx][field] = e.target.value;
  const shop = document.getElementById("bl-shop")?.value || currentBillShop || visiblePoints()[0]?.id;
  const point = pointOf(shop);
  const scale = point ? point.share/100 : 1;
  const row = billRows[idx];
  const qty = Number(row.qty)||0, rate = Number(row.rate)||0;
  const lineProfit = qty*(rate-(productOf(row.productId)?.cost||0));
  const totalEl = document.getElementById(`bl-line-total-${idx}`);
  const profitEl = document.getElementById(`bl-line-profit-${idx}`);
  if(totalEl) totalEl.textContent = rupee(qty*rate);
  if(profitEl) profitEl.textContent = `نفع: ${rupee(lineProfit)} (آپ کا ${rupee(lineProfit*scale)} / کاؤنٹر کا ${rupee(lineProfit*(1-scale))})`;
  updateBillTotals();
}
function removeBillRow(idx){ billRows.splice(idx,1); renderBillRows(); }
function updateBillTotals(){
  const shop = document.getElementById("bl-shop")?.value || visiblePoints()[0]?.id;
  const point = pointOf(shop);
  const scale = point ? point.share/100 : 1;
  const valid = billRows.filter(r=>r.productId && Number(r.qty)>0).map(r=>({...r, qty:Number(r.qty), rate:Number(r.rate)}));
  const totalAmount = valid.reduce((s,r)=>s+r.qty*r.rate,0);
  const totalProfit = valid.reduce((s,r)=>s+r.qty*(r.rate-(productOf(r.productId)?.cost||0)),0);
  const totalEl = document.getElementById("bl-total"), profitEl = document.getElementById("bl-profit");
  if(totalEl) totalEl.textContent = rupee(totalAmount);
  if(profitEl) profitEl.textContent = `نفع ${rupee(totalProfit)} (آپ کا ${rupee(totalProfit*scale)})`;
  if(selectedCustomer) updateDueDisplay();
}
async function submitBill(){
  const shop = document.getElementById("bl-shop").value;
  const valid = billRows.filter(r=>r.productId && Number(r.qty)>0).map(r=>({...r, qty:Number(r.qty), rate:Number(r.rate)}));
  if(valid.length===0) return showError("کم از کم ایک آئٹم اور تعداد درج کریں۔");
  let customerArg = null;
  if(selectedCustomer){
    const rawPay = document.getElementById("pay-amount")?.value;
    const paid = (rawPay!=null && rawPay!=="") ? Number(rawPay) : currentBillTotalAmount();
    customerArg = {
      id: selectedCustomer.id, name: selectedCustomer.name, phone: selectedCustomer.phone, description: selectedCustomer.description,
      amountPaid: paid,
    };
  }
  const result = await finalizeBill(shop, valid, customerArg);
  if(result){
    document.getElementById("bl-lastbill").innerHTML = renderLastBill(shop, valid, result, nowStr());
    resetBillRows();
    renderBillRows();
    renderCustomerSection();
  }
}

let returnInvoiceCtx = null; // when set, the return form is locked onto one specific bill
async function lookupReturnInvoice(){
  const n = Number(document.getElementById("rt-invoice")?.value);
  if(!n || n<=0) return showError("بل نمبر لکھیں (بل پر انوائس # کے ساتھ چھپا نمبر)۔");
  await ensureFullTxHistory(); // the bill may be older than the live log window
  const sale = state.txs.find(t=> t.type==="sale" && Number(t.invoiceNo)===n);
  if(!sale) return showError(`بل نمبر ${n} ریکارڈ میں نہیں ملا — نمبر دوبارہ دیکھ لیں۔`);
  if(!isLocVisible(sale.pointId)) return showError(`بل نمبر ${n} کسی اور سیل پوائنٹ کا ہے جس تک آپ کی رسائی نہیں۔`);
  // how much of each item is still returnable against THIS bill
  const returnedFor = (prodId)=> state.txs.filter(t=> t.type==="return" && t.saleTxId===sale.id && t.productId===prodId)
    .reduce((s,t)=> s + (t.qty||0), 0);
  const items = (sale.items||[]).map(it=>({
    productId: it.productId, name: it.name || productOf(it.productId)?.name || "(حذف شدہ)",
    rate: it.rate, cost: it.cost ?? (productOf(it.productId)?.cost ?? 0),
    sold: it.qty, returned: returnedFor(it.productId),
    remaining: Math.max(0, it.qty - returnedFor(it.productId)),
  }));
  returnInvoiceCtx = {saleTxId: sale.id, invoiceNo: n, pointId: sale.pointId, ts: sale.ts,
    customerName: sale.customerName || "کیش کاؤنٹر", items};
  render();
}
function clearReturnInvoice(){ returnInvoiceCtx = null; render(); }
function returnCtxSelectedItem(){
  const pid = document.getElementById("rt-inv-item")?.value;
  return returnInvoiceCtx?.items.find(i=>i.productId===pid) || null;
}
function updateLinkedReturnCalc(){
  const it = returnCtxSelectedItem();
  const qty = Number(document.getElementById("rt-inv-qty")?.value)||0;
  const amtEl = document.getElementById("rt-inv-amount"), remEl = document.getElementById("rt-inv-remaining");
  if(remEl && it) remEl.textContent = it.remaining;
  if(amtEl && it) amtEl.textContent = rupee(qty*it.rate);
}
async function submitLinkedReturn(){
  const ctx = returnInvoiceCtx;
  const it = returnCtxSelectedItem();
  if(!ctx || !it) return showError("پہلے بل کا آئٹم منتخب کریں۔");
  const qty = Number(document.getElementById("rt-inv-qty")?.value);
  const ok = await doReturn(ctx.pointId, it.productId, qty, it.rate,
    {saleTxId: ctx.saleTxId, invoiceNo: ctx.invoiceNo, rate: it.rate, cost: it.cost, maxQty: it.remaining});
  if(ok){
    showSuccess(`بل نمبر ${ctx.invoiceNo} کے خلاف ${qty} یونٹ ریٹرن درج ہو گئی۔`);
    // refresh remaining counts against the same bill so more items can be returned in a row
    document.getElementById("rt-invoice").value = ctx.invoiceNo;
    await lookupReturnInvoice();
  }
}

  return `<div class="card">

    <div class="row">
      <div class="field">بل نمبر<input id="rt-invoice" type="number" inputmode="decimal" min="1" style="width:130px" onkeydown="if(event.key==='Enter') lookupReturnInvoice();"></div>

function syncReturnRateAndCalc(){
  const pid = getItemPickerValue("rt-product");
  const p = productOf(pid);
  const rateInput = document.getElementById("rt-rate");
  if(rateInput) rateInput.value = p?.rate || 0;
  updateReturnCalc();
}
function updateReturnCalc(){
  const pid = getItemPickerValue("rt-product");
  const p = productOf(pid);
  const qtyInput = document.getElementById("rt-qty"), rateInput = document.getElementById("rt-rate");
  const qty = Number(qtyInput?.value)||0, rate = Number(rateInput?.value)||0;
  const amountEl = document.getElementById("rt-amount"), profitEl = document.getElementById("rt-profit");
  if(amountEl) amountEl.textContent = rupee(qty*rate);
  if(profitEl) profitEl.textContent = rupee(qty*(rate-(p?.cost||0)));
}

let customersViewPoint = null;
let customerSearchQuery = "";
function balanceDisplay(balance){
  balance = balance||0;
  if(balance > 0) return {text: `بقایا ${rupee(balance)}`, color: "var(--red)"};
  if(balance < 0) return {text: `جمع (ایڈوانس) ${rupee(Math.abs(balance))}`, color: "var(--green)"};
  return {text: "کوئی بقایا نہیں", color: "var(--green)"};
}

        </div>
        ${hasDue?`
        <div class="row" style="margin-top:10px;">
          <div class="field">وصول شدہ رقم<input id="pay-${c.id}" type="number" inputmode="decimal" min="1" max="${c.balance}" style="width:110px;"></div>

function buildMonthlyReportText(monthKey){

    scopedPoints.forEach(sp=>{

      totalSale+=v.sale||0; totalShare+=v.share||0; totalCounterShare+=counterShare;
      text += `${sp.name}: سیل ${rupee(v.sale)}, پورا نفع ${rupee(v.profit)}, آپ کا حصہ ${rupee(v.share)}, کاؤنٹر کا حصہ ${rupee(counterShare)}\n`;

function copyTextRobust(text, phone){
  function legacyFallback(){
    let worked = false;
    try{
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.top = "-9999px";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, text.length);
      worked = document.execCommand && document.execCommand("copy");
      document.body.removeChild(ta);
    }catch(e){ worked = false; }
    if(worked){ showSuccess("رپورٹ کاپی ہو گئی — اب کہیں بھی پیسٹ کر سکتے ہیں۔"); }
    else { showReportManually(text, phone); }
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{
      showSuccess("رپورٹ کاپی ہو گئی — اب کہیں بھی پیسٹ کر سکتے ہیں۔");
    }).catch(()=>{ legacyFallback(); });
  } else {
    legacyFallback();
  }
}

/* ====================== THEME (dark/light) ====================== */
function applyTheme(theme){
  const root = document.documentElement;
  if(root && root.setAttribute){
    if(theme==="dark") root.setAttribute("data-theme","dark");
    else root.removeAttribute("data-theme");
  }
  const btn = document.getElementById("themeToggleBtn");
  if(btn) btn.textContent = theme==="dark" ? "☀️" : "🌙";
}

  const cur = (localStorage.getItem("al_ammar_theme")==="dark") ? "light" : "dark";
  try{ localStorage.setItem("al_ammar_theme", cur); }catch(e){}
  applyTheme(cur);
}

function whatsAppLink(phone, text){
  const digits = (phone||"").replace(/\D/g,"");
  if(!digits) return null;
  const intl = digits.startsWith("0") ? "92"+digits.slice(1) : digits;
  return `https://wa.me/${intl}?text=${encodeURIComponent(text)}`;
}

// For reports with no single fixed recipient (monthly / loss reports): opens WhatsApp directly
// with the text pre-filled, letting the person pick whichever chat they want to send it to —
// unlike wa.me/<number> links, this doesn't require or open any specific contact's chat.

  const link = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;

  showSuccess("واٹس ایپ کھل رہا ہے — جسے چاہیں منتخب کر کے رپورٹ بھیج دیں۔");

  document.getElementById("reportClose").onclick = () => { overlay.style.display = "none"; };
