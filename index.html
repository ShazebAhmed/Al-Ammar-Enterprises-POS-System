<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;600;700&amp;family=Noto+Nastaliq+Urdu:wght@700&display=swap" rel="stylesheet">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>العمار انٹرپرائزز — اسٹاک لیجر</title>
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%D8%A7%D9%84%D8%B9%D9%85%D8%A7%D8%B1%20%D8%A7%D9%86%D9%B9%D8%B1%D9%BE%D8%B1%D8%A7%D8%A6%D8%B2%22%2C%22short_name%22%3A%22%D8%A7%D9%84%D8%B9%D9%85%D8%A7%D8%B1%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23F7F2E7%22%2C%22theme_color%22%3A%22%231E3A52%22%7D">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --paper:#F7F2E7; --card:#FFFDF7; --ink:#1E3A52; --inkDark:#0F2436;
    --gold:#C89A2E; --green:#3D6B4A; --red:#A8402E; --line:#DCD3BC;
    --text:#2B2620; --muted:#6B6250; --purple:#5B4B7A;
  }
  html[data-theme="dark"]{
    --paper:#15130F; --card:#211E18; --ink:#8FB4D4; --inkDark:#E3EDF6;
    --gold:#D9B04C; --green:#82C093; --red:#E08B78; --line:#3B372E;
    --text:#ECE6DA; --muted:#A89E8C; --purple:#B7A7DA;
  }
  /* Exported bill/report images always render on their own light constants —
     lock their containers to light variables so dark mode never leaks into them. */
  #billImageTemplate, #reportImage{
    --paper:#F7F2E7; --card:#FFFDF7; --ink:#1E3A52; --inkDark:#0F2436;
    --gold:#C89A2E; --green:#3D6B4A; --red:#A8402E; --line:#DCD3BC;
    --text:#2B2620; --muted:#6B6250; --purple:#5B4B7A;
  }
  /* Thermal/receipt printing: hide the whole app, print only the receipt (approx 72mm). */
  #printArea{display:none;}
  @media print{
    body *{visibility:hidden !important;}
    #printArea, #printArea *{visibility:visible !important;}
    #printArea{display:block !important;position:absolute;top:0;right:0;width:72mm;background:#fff;color:#000;font-family:'Segoe UI',Tahoma,Arial,sans-serif;}
    @page{margin:2mm;}
  }
  *{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  body{margin:0;background:var(--paper);color:var(--text);font-family:'Noto Naskh Arabic',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:600;}
  button,input,select,textarea{font-family:inherit;}
  .num{font-variant-numeric:tabular-nums;}
  .wrap{max-width:1040px;margin:0 auto;padding:18px 14px 70px;}
  .brand{text-align:center;padding:18px 10px 14px;border-bottom:4px double var(--ink);margin-bottom:10px;background:linear-gradient(180deg,#FFFDF7,transparent);}
  .brand h1{margin:0;font-family:'Noto Nastaliq Urdu','Noto Naskh Arabic',serif;font-size:30px;font-weight:700;color:var(--inkDark);letter-spacing:1px;text-shadow:0 1px 0 rgba(255,255,255,0.6);}
  .brand .tagline{margin:4px 0 0;font-size:12.5px;color:var(--muted);letter-spacing:0.5px;}
  .activeBanner{background:var(--ink);color:#FFFDF7;border-radius:10px;padding:9px 14px;margin-bottom:14px;font-size:12.5px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:nowrap;overflow-x:auto;white-space:nowrap;}
  .activeBanner b{color:var(--gold);}
  .conn{display:flex;align-items:center;gap:6px;font-size:11px;}
  .dot{width:8px;height:8px;border-radius:50%;background:#999;display:inline-block;}
  .dot.on{background:#7FD68A;}
  .dot.off{background:#E88;}
  .hamburger-btn{background:var(--ink);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:12px;min-width:0;flex:1 1 auto;overflow:hidden;}
  .nav-menu{display:none;flex-direction:column;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:16px;}
  .nav-menu.open{display:flex;}
  .nav-menu .tab-btn{text-align:right;border-radius:8px;width:100%;padding:11px 14px;}
  input[type="number"]{direction:ltr;text-align:left;}
  input.ltr-input{direction:ltr;text-align:left;}
  .tab-btn{padding:8px 14px;border-radius:20px;border:1.5px solid var(--line);background:var(--card);color:var(--text);font-size:12.5px;font-weight:700;cursor:pointer;}
  .tab-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;}
  .card h3{margin:0 0 10px;color:var(--inkDark);font-size:15px;}
  .field{display:flex;flex-direction:column;gap:5px;font-size:12.5px;color:var(--muted);font-weight:600;}
  .field input,.field select{width:100%;max-width:100%;min-width:0;border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;background:var(--card);color:var(--text);font-family:inherit;}
  .row > .field, .bill-row > .field{flex:1 1 140px;min-width:110px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .btn{border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;color:#FFFDF7;}
  .btn-ghost{background:transparent;border:1.5px solid var(--line);border-radius:8px;padding:7px 11px;cursor:pointer;color:var(--text);font-size:13px;font-weight:600;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{padding:6px;border-bottom:2px solid var(--line);text-align:right;}
  td{padding:6px;border-bottom:1px solid var(--line);}
  .stamp{border:2px solid;border-radius:6px;padding:1px 8px;font-size:11px;font-weight:700;transform:rotate(-3deg);display:inline-block;white-space:nowrap;}
  .err{background:#FBE7E2;border:1.5px solid var(--red);color:var(--red);border-radius:9px;padding:12px 16px;font-size:13.5px;display:flex;justify-content:space-between;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,0.18);}
  #errBox{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:10000;width:92%;max-width:520px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;}
  .bill-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;}
  .kpi{flex:1;min-width:170px;text-align:center;}
  .kpi .big{font-size:23px;font-weight:800;color:var(--inkDark);}
  .kpi .lbl{font-size:11.5px;color:var(--muted);}
  .pill{font-size:11px;color:var(--green);background:#EAF2EC;border:1px solid var(--green);border-radius:20px;padding:2px 10px;}
  .muted{color:var(--muted);}
  .rowline{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:4px 0;gap:8px;}
  .loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px;}
  .lowInput{width:60px;border:1.5px solid var(--line);border-radius:6px;padding:3px 5px;font-size:12px;text-align:center;}
  ::placeholder{font-family:inherit;}
  .prod-row-wrap{position:relative;overflow:hidden;border-radius:10px;margin-bottom:8px;}
  .prod-row-delete{position:absolute;inset:0;display:flex;align-items:stretch;justify-content:flex-end;background:var(--red);border-radius:10px;direction:ltr;}
  .prod-row-delete button{width:112px;background:transparent;border:none;color:#fff;font-weight:800;font-size:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;}
  .prod-row{position:relative;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;transform:translateX(0);transition:transform .18s ease;touch-action:pan-y;will-change:transform;}
  .prod-desktop-del{display:none;}

  /* ====== DESKTOP LAYOUT (بڑی اسکرین) ====== */
  @media (min-width: 768px){
    .wrap{max-width:1180px;}
    #hamburgerBtn{display:none;}
    .topRow{flex-wrap:nowrap;}
    /* Tabs become a permanently-visible horizontal bar — no menu tap needed on desktop */
    .nav-menu{display:flex !important;flex-direction:row;flex-wrap:nowrap;overflow-x:auto;gap:6px;background:transparent;border:none;padding:0 0 4px;}
    .nav-menu .tab-btn{width:auto;text-align:center;border-radius:20px;padding:7px 13px;font-size:12px;white-space:nowrap;flex:0 0 auto;}
    /* Swipe is awkward with a mouse — show a normal delete button instead, hide the swipe hint */
    .prod-desktop-del{display:inline-flex;align-items:center;}
    .swipe-hint{display:none;}
    .kpi .big{font-size:26px;}
  }
  /* Large desktop screens (shop computers): use the empty side space and scale ALL text up
     uniformly. zoom scales inline-styled content too (log rows, dashboards), which plain
     font-size rules could not reach. Phones/tablets below 1100px are untouched. */
  @media (min-width: 1100px){
    body > *:not(#billImageTemplate):not(#reportImageTemplate):not(#printArea){zoom:1.22;}
    .wrap{max-width:1400px;padding:22px 26px 80px;}
    .card{padding:20px 24px;}
    .nav-menu .tab-btn{font-size:13.5px;padding:9px 16px;}
    .field input,.field select{padding:10px 12px;}
    .btn{padding:12px 22px;}
  }
  /* Hover/focus polish — no effect on touch devices */
  @media (hover:hover){
    .btn{transition:filter .15s ease;}
    .btn:hover{filter:brightness(1.1);}
    .btn-ghost:hover{background:var(--paper);border-color:var(--ink);}
    .tab-btn:hover{border-color:var(--ink);}
    .prod-row:hover{border-color:var(--ink);}
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 2px rgba(30,58,82,0.12);}
</style>
</head>
<body>
<div id="lockScreenOverlay" style="display:none;position:fixed;inset:0;background:var(--paper);z-index:20000;overflow-y:auto;"></div>
<div class="wrap" id="mainWrap">
  <div class="brand">
    <h1>العمار انٹرپرائزز</h1>
    <p class="tagline">اسٹاک لیجر — لائیو شیئرڈ سسٹم <span style="opacity:.65;">· ورژن 16</span></p>
  </div>
  <div id="errBox"></div>
  <div class="activeBanner">
    <span>📌 مہینہ اندراج: <b id="activeMonthLabel">...</b></span>
    <span id="offlineBadge"></span>
    <span style="display:flex;align-items:center;gap:8px;">
      <span id="personBadge" style="font-size:11px;"></span>
      <button id="themeToggleBtn" onclick="toggleTheme()" title="ڈارک/لائٹ موڈ" style="background:none;border:1.5px solid rgba(255,255,255,.4);border-radius:8px;color:inherit;font-size:13px;padding:3px 8px;cursor:pointer;">🌙</button>
      <span class="conn"><span class="dot" id="connDot"></span><span id="connText">چیک ہو رہا ہے</span></span>
    </span>
  </div>
  <div class="topRow" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
    <button id="hamburgerBtn" class="hamburger-btn" style="margin-bottom:0;" onclick="toggleNavMenu()">
      <span>☰</span>
      <span id="currentTabLabel" style="color:var(--gold);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px;display:inline-block;"></span>
    </button>
    <button onclick="setTab('sale')" style="background:var(--green);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:800;cursor:pointer;flex-shrink:0;">🛒 سیل</button>
    <div id="todayDateBox" style="background:var(--ink);color:#fff;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700;flex-shrink:0;"></div>
  </div>
  <div id="tabsNav" class="nav-menu"></div>
  <div id="tabContent"><div class="loading">🔄 ڈیٹا لوڈ ہو رہا ہے، براہ کرم انتظار کریں...</div></div>
</div>
<div id="confirmOverlay" style="display:none;position:fixed;inset:0;background:rgba(15,36,54,0.55);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--card);border-radius:14px;padding:22px;max-width:320px;width:88%;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.3);">
    <div id="confirmMsg" style="margin-bottom:18px;font-size:14.5px;line-height:1.6;color:var(--text);"></div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button id="confirmYes" class="btn" style="background:var(--red);flex:1;">جی ہاں، کریں</button>
      <button id="confirmNo" class="btn-ghost" style="flex:1;">منسوخ کریں</button>
    </div>
  </div>
</div>
<div id="billImageTemplate" style="position:fixed;top:-9999px;left:-9999px;"></div>
<div id="printArea" dir="rtl"></div>
<div id="reportImageTemplate" style="position:fixed;top:-9999px;left:-9999px;"></div>
<div id="barcodeOverlay" style="display:none;position:fixed;inset:0;background:rgba(15,36,54,0.85);z-index:10500;align-items:center;justify-content:center;flex-direction:column;">
  <div style="background:var(--card);border-radius:14px;padding:16px;max-width:340px;width:90%;text-align:center;">
    <div style="font-weight:700;margin-bottom:10px;color:var(--inkDark);">📷 بارکوڈ اسکین کریں</div>
    <div id="barcode-reader" style="width:100%;border-radius:8px;overflow:hidden;"></div>
    <button id="barcodeCancelBtn" class="btn-ghost" style="margin-top:12px;width:100%;">منسوخ کریں</button>
  </div>
</div>
<div id="reportOverlay" style="display:none;position:fixed;inset:0;background:rgba(15,36,54,0.55);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--card);border-radius:14px;padding:20px;max-width:480px;width:92%;box-shadow:0 10px 30px rgba(0,0,0,0.3);">
    <div style="font-size:13.5px;color:var(--muted);margin-bottom:10px;">خودکار کاپی ممکن نہیں ہو سکی — نیچے دیے گئے ٹیکسٹ کو دبا کر رکھیں، "Select All" پھر "Copy" منتخب کریں:</div>
    <textarea id="reportTextArea" readonly dir="ltr" style="width:100%;height:220px;border:1.5px solid var(--line);border-radius:8px;padding:10px;font-size:12.5px;font-family:monospace;background:var(--paper);color:var(--text);"></textarea>
    <div style="display:flex;gap:10px;margin-top:12px;">
      <button id="reportTryCopyAgain" class="btn" style="background:var(--green);flex:1;">دوبارہ کاپی آزمائیں</button>
      <button id="reportWhatsAppBtn" class="btn" style="background:#25D366;flex:1;display:none;">📱 واٹس ایپ پر بھیجیں</button>
      <button id="reportClose" class="btn-ghost" style="flex:1;">بند کریں</button>
    </div>
  </div>
</div>

<script>
/* ====================== FIREBASE INIT ====================== */
const firebaseConfig = {
  apiKey: "AIzaSyBwdedyVhDo7Exx7KZKhutal5OiX6TwILs",
  authDomain: "al-ammar-sheet.firebaseapp.com",
  databaseURL: "https://al-ammar-sheet-default-rtdb.firebaseio.com/",
  projectId: "al-ammar-sheet",
  storageBucket: "al-ammar-sheet.firebasestorage.app",
  messagingSenderId: "577305455244",
  appId: "1:577305455244:web:1d6a972e6138f9940b29a9"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
// The database rules require auth != null — without this, every read/write below is refused.
// Anonymous auth needs no signup/password; it just gives this browser session a real Firebase
// identity so the rules can tell "someone using the app" apart from a stranger who merely found
// the databaseURL in the page source and is hitting the REST API directly with no SDK at all.
auth.signInAnonymously().catch(err=>{
  showError("لاگ ان میں خرابی — انٹرنیٹ کنکشن چیک کر کے صفحہ دوبارہ لوڈ کریں: "+err.message);
});
auth.onAuthStateChanged(user=>{
  if(user) startApp();
});

/* ====================== CONSTANTS ====================== */
const URDU_MONTHS = ["جنوری","فروری","مارچ","اپریل","مئی","جون","جولائی","اگست","ستمبر","اکتوبر","نومبر","دسمبر"];
const DEFAULT_LOW_STOCK = 10;

const TX_META = {
  transfer:{label:"ٹرانسفر", color:"var(--ink)", icon:"↔️"},
  purchase:{label:"نئی خریداری", color:"var(--green)", icon:"📦"},
  sale:{label:"سیل", color:"var(--green)", icon:"🛒"},
  return:{label:"ریٹرن", color:"var(--gold)", icon:"↩️"},
  loss:{label:"نقصان/ایڈجسٹمنٹ", color:"var(--red)", icon:"⚠️"},
  add:{label:"نیا پروڈکٹ", color:"var(--muted)", icon:"➕"},
  delete:{label:"حذف/ہٹایا گیا", color:"var(--red)", icon:"🗑️"},
  restore:{label:"بحال کیا گیا", color:"var(--green)", icon:"↩️"},
  close:{label:"مہینہ بند", color:"var(--ink)", icon:"📅"},
  reopen:{label:"مہینہ دوبارہ کھلا", color:"var(--gold)", icon:"🔓"},
  payment:{label:"ادھار وصولی", color:"var(--purple)", icon:"💰"},
};

/* ====================== LOCAL MIRROR ====================== */
let state = {
  products: [], sellPoints: [], stock: {godown:{}}, restock: [], txs: [],
  months: {}, activeMonthKey: null, customers: {}, people: [], // customers keyed by pointId -> {custId: {...}}
  loaded: {products:false, sellPoints:false, stock:false, restock:false, months:false, activeMonthKey:false, people:false},
};

/* ====================== LOGIN SESSION + OFFLINE QUEUE (globals) ====================== */
let currentPerson = null; // {id, name, pin, role:"owner"|"staff", pointId}
let isOnline = false; // driven by db .info/connected — starts pessimistic until that listener confirms we're actually connected
const SESSION_HOURS = 12;
let pendingOps = [];
try{ pendingOps = JSON.parse(localStorage.getItem("al_ammar_pending")||"[]"); }catch(e){ pendingOps = []; }
function savePendingOps(){ try{ localStorage.setItem("al_ammar_pending", JSON.stringify(pendingOps)); }catch(e){} }
function cacheStateSnapshot(){
  try{
    localStorage.setItem("al_ammar_cache", JSON.stringify({
      products: state.products, sellPoints: state.sellPoints, stock: state.stock,
      customers: state.customers, months: state.months, activeMonthKey: state.activeMonthKey,
      restock: state.restock, people: state.people,
    }));
  }catch(e){}
}
function loadCachedStateIfStillLoading(){
  if(firstLoadDone) return;
  try{
    const cached = JSON.parse(localStorage.getItem("al_ammar_cache")||"null");
    if(!cached) return;
    Object.assign(state, cached);
    state.txs = state.txs || [];
    firstLoadDone = true;
    showError("انٹرنیٹ کنکشن نہیں مل رہا — پرانا (محفوظ شدہ) ڈیٹا دکھایا جا رہا ہے۔ نئی انٹریز انٹرنیٹ آنے پر خودکار سنک ہو جائیں گی۔");
    render();
  }catch(e){}
}

function monthKeyOf(year, month){ return year+"-"+month; }
function currentRealMonthKey(){ const d=new Date(); return monthKeyOf(d.getFullYear(), d.getMonth()); }
function monthLabelOf(year, month){ return URDU_MONTHS[month]+" "+year; }
function parseMonthKey(key){ const [y,m] = key.split("-").map(Number); return {year:y, month:m}; }
function nextMonthKey(key){ let {year,month} = parseMonthKey(key); month++; if(month>11){month=0;year++;} return monthKeyOf(year,month); }

function seedData(){
  const products = {
    p1:{id:"p1",name:"بلیڈ ڈورکو لارج",code:"BLD-LG",cost:15,rate:30,lowStock:10},
    p2:{id:"p2",name:"باکس 1 کارڈ",code:"BX-1",cost:8,rate:20,lowStock:10},
    p3:{id:"p3",name:"باکس 2 کارڈ",code:"BX-2",cost:14,rate:25,lowStock:10},
    p4:{id:"p4",name:"باکس لیٹر ہیڈ",code:"BX-LH",cost:31,rate:50,lowStock:10},

async function importRealStockLevels(){
  const flagSnap = await db.ref("meta/realStockImported").once("value");
  if(flagSnap.exists() && flagSnap.val()===true) return;

  const productsSnap = await db.ref("products").once("value");
  const existing = productsSnap.val() || {};
  const bySlug = {};
  Object.values(existing).forEach(p=>{ bySlug[p.name] = p; });

  const spSnap = await db.ref("sellPoints").once("value");
  const sellPoints = Object.keys(spSnap.val() || {});
  const point1 = sellPoints[0], point2 = sellPoints[1];

  const updates = {};
  REAL_STOCK_IMPORT.forEach(([name, cost, rate, godownQty, shop1Qty, shop2Qty])=>{
    let p = bySlug[name];
    if(!p){
      // this item was missing from our earlier import (e.g. Rassi Ka Gola Chota White) — add it now
      const id = "real_"+name.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
      updates["products/"+id] = {id, name, code:"-", cost, rate, lowStock:10};
      p = {id};
    } else {
      // keep prices in sync with the latest real sheet
      updates["products/"+p.id+"/cost"] = cost;
      updates["products/"+p.id+"/rate"] = rate;
    }
    // negative quantities in the old spreadsheet reflect unreconciled data-entry issues,
    // not real physical stock — clamp at 0 so the app (and future transfers) stay consistent.
    updates["stock/godown/"+p.id] = Math.max(0, godownQty);
    if(point1) updates["stock/"+point1+"/"+p.id] = Math.max(0, shop1Qty);
    if(point2) updates["stock/"+point2+"/"+p.id] = Math.max(0, shop2Qty);
  });

  await db.ref().update(updates);
  await db.ref("meta/realStockImported").set(true);
}


async function migrateToRealInventory(){
  const flagSnap = await db.ref("meta/realInventoryMigrated").once("value");
  if(flagSnap.exists() && flagSnap.val()===true) return;

  const updates = {};
  // soft-delete the old Urdu placeholder/test products (history stays intact)
  const productsSnap2 = await db.ref("products").once("value");
  const existingProducts = productsSnap2.val() || {};
  OLD_SEED_PRODUCT_IDS.forEach(pid=>{
    if(existingProducts[pid]){
      updates["products/"+pid+"/deleted"] = true;
      updates["products/"+pid+"/deletedAt"] = dateOnlyStr();
    }
  });
  // add the real inventory as new products with zero stock everywhere (real on-hand counts
  // need to be entered manually via "ری اسٹاک" since we can't know current physical stock)
  const spSnap3 = await db.ref("sellPoints").once("value");
  const sellPointIds = Object.keys(spSnap3.val() || {});
  REAL_INVENTORY.forEach(([name, cost, rate])=>{
    const id = "real_"+name.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
    if(existingProducts[id]) return; // don't duplicate if this somehow already ran partially
    updates["products/"+id] = {id, name, code:"-", cost, rate, lowStock:10};
    updates["stock/godown/"+id] = 0;
    sellPointIds.forEach(spId=>{ updates["stock/"+spId+"/"+id] = 0; });
  });
  await db.ref().update(updates);
  await db.ref("meta/realInventoryMigrated").set(true);
}

const JUNK_TEST_PRODUCT_NAMES = ["امبریلا", "قینچی"];
async function cleanupJunkTestProducts(){
  const flagSnap = await db.ref("meta/junkProductsCleaned").once("value");
  if(flagSnap.exists() && flagSnap.val()===true) return;

  const productsSnap = await db.ref("products").once("value");

      updates["stock/godown/"+pid] = null;

  await db.ref("meta/junkProductsCleaned").set(true);
}

async function initData(){
  const productsSnap = await db.ref("products").once("value");
  // Seeding decision is based on a one-time flag, NOT on whether products exist —
  // otherwise a full catalog reset (which legitimately leaves products empty) would
  // cause the next page load to re-seed demo products AND overwrite months /
  // activeMonthKey / sellPoints, destroying the real monthly history and store settings.
  const seededSnap = await db.ref("meta/seeded").once("value");
  const alreadySeeded = seededSnap.val() === true || productsSnap.exists();
  if(alreadySeeded && seededSnap.val() !== true){
    await db.ref("meta/seeded").set(true); // stamp existing live databases once
  }
  if(!alreadySeeded){
    const seed = seedData();
    await db.ref().update({
      products: seed.products, sellPoints: seed.sellPoints, stock: seed.stock,
      restock: seed.restock, months: seed.months, activeMonthKey: seed.activeMonthKey,
      "meta/seeded": true,
    });
  } else {
    // migrating an existing database that doesn't yet have months/activeMonthKey
    const monthsSnap = await db.ref("months").once("value");
    if(!monthsSnap.exists()){
      const runningSnap = await db.ref("running").once("value");
      const running = runningSnap.val() || {};
      const now = new Date();
      const key = currentRealMonthKey();
      const points = {};
      Object.keys(running.printers||{}).forEach(pid=>{ points[pid] = running.printers[pid]; });
      if(!points.pr_alammar) points.pr_alammar = {sale:0,profit:0,share:0};
      if(!points.pr_ar) points.pr_ar = {sale:0,profit:0,share:0};
      await db.ref("months/"+key).set({year:now.getFullYear(), month:now.getMonth(), label: monthLabelOf(now.getFullYear(), now.getMonth()), status:"open", points});
      await db.ref("activeMonthKey").set(key);
    }
    // ensure sellPoints exists (older DBs called this 'printers')
    const spSnap = await db.ref("sellPoints").once("value");
    if(!spSnap.exists()){
      const oldPrinters = await db.ref("printers").once("value");
      if(oldPrinters.exists()) await db.ref("sellPoints").set(oldPrinters.val());
    }
    // one-time fix: any sell point name mixing Latin+Urdu script (e.g. "Al Ammar پرنٹر")
    // garbles when html2canvas draws the bill image — force it to a clean pure-Urdu name.
    const spSnap2 = await db.ref("sellPoints").once("value");
    if(spSnap2.exists()){
      const sp = spSnap2.val();
      const updates2 = {};
      Object.entries(sp).forEach(([id, v])=>{
        if(v.name && /[A-Za-z]/.test(v.name) && /[\u0600-\u06FF]/.test(v.name)){
          updates2["sellPoints/"+id+"/name"] = "العمار پرنٹرز";
        }
      });
      if(Object.keys(updates2).length) await db.ref().update(updates2);
    }
    // backfill lowStock on legacy products
    const products = productsSnap.val();
    const updates = {};
    Object.entries(products||{}).forEach(([pid,p])=>{ if(p.lowStock===undefined) updates["products/"+pid+"/lowStock"]=DEFAULT_LOW_STOCK; });
    if(Object.keys(updates).length) db.ref().update(updates);
  }
  await migrateToRealInventory();
  await cleanupJunkTestProducts();
  await importRealStockLevels();

  // Seed a default owner login so the PIN-lock screen always has at least one working PIN.
  const peopleSnap = await db.ref("people").once("value");
  if(!peopleSnap.exists()){
    await db.ref("people/owner1").set({id:"owner1", name:"مالک", pin:"1234", role:"owner", pointId:null});
  }
}

/* ====================== LIVE LISTENERS ====================== */
function toArr(obj){ return obj ? Object.keys(obj).map(k=> Object.assign({id:k}, obj[k])) : []; }
const TXS_LIVE_LIMIT = 1500;
// The live listener only keeps the newest TXS_LIVE_LIMIT entries (mobile data/memory).
// Reports and month filters need the FULL history — so the first time one of them runs
// while the live window is full, we fetch everything once and merge it in. From then on
// every listener update re-merges, so old entries never silently vanish from reports.
let txFullHistory = null; // id -> tx (raw), fetched on demand, kept for the session
function mergeTxFullHistory(){
  if(!txFullHistory) return;
  const have = new Set(state.txs.map(t=>t.id));
  const extra = toArr(txFullHistory).filter(t=>!have.has(t.id));
  if(extra.length){
    state.txs = state.txs.concat(extra).sort((a,b)=> String(b.ts||"").localeCompare(String(a.ts||"")));
  }
}
async function ensureFullTxHistory(){
  if(txFullHistory) return true;                                  // already fetched this session
  if(state.txs.filter(t=>!t.pending).length < TXS_LIVE_LIMIT) return true; // nothing truncated yet
  if(!isOnline){ showError("انٹرنیٹ کنکشن نہیں ہے — پرانی مکمل ہسٹری لوڈ نہیں ہو سکی، رپورٹ صرف حالیہ انٹریز پر بنے گی۔"); return false; }
  const snap = await db.ref("txs").once("value");
  txFullHistory = snap.val() || {};
  mergeTxFullHistory();
  render();
  return true;
}
function attachLiveListeners(){

db.ref("products").on("value", snap=>{ state.products = toArr(snap.val()); state.loaded.products=true; afterLoad(); render(); });
db.ref("sellPoints").on("value", snap=>{ state.sellPoints = toArr(snap.val()); state.loaded.sellPoints=true; afterLoad(); render(); });
db.ref("stock").on("value", snap=>{ state.stock = snap.val() || {godown:{}}; state.loaded.stock=true; afterLoad(); render(); if(firstLoadDone) autoSuggestRestock(); });
db.ref("restock").on("value", snap=>{ state.restock = toArr(snap.val()); state.loaded.restock=true; afterLoad(); render(); });
db.ref("customers").on("value", snap=>{ state.customers = snap.val() || {}; render(); });
db.ref("months").on("value", snap=>{ state.months = snap.val() || {}; state.loaded.months=true; afterLoad(); render(); });
db.ref("activeMonthKey").on("value", snap=>{ state.activeMonthKey = snap.val() || currentRealMonthKey(); state.loaded.activeMonthKey=true; afterLoad(); render(); });
db.ref("people").on("value", snap=>{ state.people = toArr(snap.val()); state.loaded.people=true; afterLoad(); render(); restoreSessionIfAny(); });
db.ref("txs").limitToLast(1500).on("value", snap=>{
  const arr = toArr(snap.val());
  state.txs = arr.slice().reverse();
  mergeTxFullHistory();
  rehydratePendingTxs();
  render();
});
db.ref(".info/connected").on("value", snap=>{
  const dot = document.getElementById("connDot"), txt = document.getElementById("connText");
  const wasOnline = isOnline;
  isOnline = snap.val()===true;
  if(isOnline){ dot.className="dot on"; txt.textContent="آن لائن"; }
  else { dot.className="dot off"; txt.textContent="آف لائن"; }
  renderOfflineBadge();
  if(isOnline && !wasOnline && pendingOps.length>0) processPendingOps();
});

}

async function startApp(){
  await initData();
  attachLiveListeners();
}

let firstLoadDone = false;
function afterLoad(){
  const l = state.loaded;
  if(!firstLoadDone && l.products && l.sellPoints && l.stock && l.restock && l.months && l.activeMonthKey && l.people){
    firstLoadDone = true;
    cacheStateSnapshot();
  }
}
// If Firebase never connects at all (no internet from a cold start), fall back to whatever
// we last cached locally so the shop can still work (and queue sales) instead of staring at
// a permanent loading spinner.
setTimeout(loadCachedStateIfStillLoading, 6000);

/* ====================== HELPERS ====================== */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function askConfirm(message){
  return new Promise(resolve=>{
    const overlay = document.getElementById("confirmOverlay");
    const msgEl = document.getElementById("confirmMsg");
    const yes = document.getElementById("confirmYes");
    const no = document.getElementById("confirmNo");
    msgEl.textContent = message;
    overlay.style.display = "flex";
    function cleanup(result){
      overlay.style.display = "none";
      yes.onclick = null; no.onclick = null;
      resolve(result);
    }
    yes.onclick = () => cleanup(true);
    no.onclick = () => cleanup(false);
  });
}
function rupee(n){ n = Number(n)||0; return "Rs. " + n.toLocaleString("en-PK",{maximumFractionDigits:2}); }
// Money must be rounded to 2 decimals at the point it's WRITTEN to Firebase, not just when
// displayed — otherwise JS floating point noise (e.g. 10.000000000000002 from repeated
// multiplication/addition) accumulates silently in the database across many transactions.
function round2(n){ return Math.round((Number(n)||0) * 100) / 100; }
function formatDateUrdu(d){
  return `${d.getDate()} ${URDU_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
function nowStr(){
  const d = new Date();
  let hours = d.getHours();
  const minutes = String(d.getMinutes()).padStart(2,'0');
  const ampm = hours>=12 ? 'PM' : 'AM';
  hours = hours % 12; if(hours===0) hours=12;
  return `${formatDateUrdu(d)}, ${hours}:${minutes} ${ampm}`;
}
function dateOnlyStr(){
  return formatDateUrdu(new Date());
}
function allLocs(){ return [{id:"godown", label:"گودام"}, ...state.sellPoints.map(p=>({id:p.id,label:p.name}))]; }
function locLabel(id){
  const l = allLocs().find(x=>x.id===id);
  if(l) return l.label;
  if(id==="godown") return "گودام";
  return "(ہٹایا گیا اسٹور)";
}
function productOf(id){ return state.products.find(p=>p.id===id); }
function activeProducts(){ return state.products.filter(p=>!p.deleted).sort((a,b)=>a.name.localeCompare(b.name)); }
function customersOf(pointId){ return state.customers[pointId] ? Object.keys(state.customers[pointId]).map(k=>({id:k, ...state.customers[pointId][k]})) : []; }
function customerOf(pointId, custId){ return state.customers[pointId] ? state.customers[pointId][custId] : null; }
function customerBalanceDelta(pointId, custId, delta){
  return db.ref("customers/"+pointId+"/"+custId+"/balance").transaction(current=>round2((current||0)+delta));
}
async function upsertCustomer(pointId, custId, name, phone, description){
  if(!custId) custId = db.ref("customers/"+pointId).push().key;
  const existing = customerOf(pointId, custId);
  await db.ref("customers/"+pointId+"/"+custId).update({
    id: custId, name: name.trim(), phone: (phone||"").trim(), description: (description||"").trim(),
    balance: existing ? (existing.balance||0) : 0,
  });
  return custId;
}
async function recordCustomerRefund(pointId, custId, amount){
  try{
    amount = Number(amount);
    if(!amount || amount<=0) return showError("رقم درست درج کریں۔");
    if(!isOnline) return showError("انٹرنیٹ کنکشن نہیں ہے — یہ عمل صرف انٹرنیٹ بحال ہونے پر ممکن ہے (صرف 'سیل' آف لائن کام کرتی ہے)۔");
    const c = customerOf(pointId, custId);
    if(!c) return showError("کسٹمر نہیں ملا۔");
    const advance = Math.max(0, -(c.balance||0));
    if(advance<=0) return showError(`"${c.name}" کی کوئی جمع رقم نہیں — واپسی صرف جمع (ایڈوانس) رقم کی ہو سکتی ہے۔`);
    if(amount > advance+0.01) return showError(`"${c.name}" کی جمع رقم صرف ${rupee(advance)} ہے — اس سے زیادہ واپسی درج نہیں ہو سکتی۔`);
    await customerBalanceDelta(pointId, custId, amount);
    logTx("payment", {note:`${c.name} — ${locLabel(pointId)} پر جمع رقم میں سے ${rupee(amount)} واپس ادا کیے (ریٹرن/ایڈوانس کی واپسی)`, pointId, custId, amount, refund:true});
    render();
    showSuccess("رقم کی واپسی درج ہو گئی۔");
  }catch(e){ showError("واپسی درج کرتے وقت خرابی: "+e.message); }
}
async function recordCustomerPayment(pointId, custId, amount){
  try{
    amount = Number(amount);
    if(!amount || amount<=0) return showError("رقم درست درج کریں۔");
    if(!isOnline) return showError("انٹرنیٹ کنکشن نہیں ہے — یہ عمل صرف انٹرنیٹ بحال ہونے پر ممکن ہے (صرف 'سیل' آف لائن کام کرتی ہے)۔");
    const c = customerOf(pointId, custId);
    if(!c) return showError("کسٹمر نہیں ملا۔");
    if(amount > (c.balance||0)+0.01) return showError(`"${c.name}" کا بقایا صرف ${rupee(c.balance||0)} ہے — اس سے زیادہ وصولی درج نہیں ہو سکتی۔`);
    await customerBalanceDelta(pointId, custId, -amount);
    logTx("payment", {note:`${c.name} — ${locLabel(pointId)} پر ${rupee(amount)} وصول ہوئے`, pointId, custId, amount});
    render();
    showSuccess("ادائیگی درج ہو گئی۔");
  }catch(e){ showError("ادائیگی درج کرتے وقت خرابی: "+e.message); }
}
function pointOf(id){ return state.sellPoints.find(p=>p.id===id); }
function getQty(loc, pid){ return (state.stock[loc] && state.stock[loc][pid]) || 0; }
function lowStockOf(p){ return (p && p.lowStock!=null) ? p.lowStock : DEFAULT_LOW_STOCK; }
let errTimer=null;

  document.getElementById("errBox").innerHTML =
    `<div class="err"><span>${esc(msg)}</span><span style="cursor:pointer" onclick="document.getElementById('errBox').innerHTML=''">✕</span></div>`;

/* ====================== LOGIN / PIN LOCK + OFFLINE QUEUE ENGINE ====================== */
function personOf(id){ return state.people.find(p=>p.id===id); }
function isOwnerUser(){ return !!(currentPerson && currentPerson.role==="owner"); }
// A staff account tied to a specific sell point (pointId) must never see or act on the OTHER
// store's data — not in dropdowns, not in dashboards, not in history. Owners (and any staff
// with no pointId set) see everything. This one pair of helpers is used everywhere sell points
// or locations get listed, so scoping stays consistent across every tab.
function visiblePoints(){
  if(isOwnerUser() || !currentPerson || !currentPerson.pointId) return state.sellPoints;
  return state.sellPoints.filter(sp=>sp.id===currentPerson.pointId);
}
function visibleLocs(){
  return [{id:"godown", label:"گودام"}, ...visiblePoints().map(p=>({id:p.id,label:p.name}))];
}
function isLocVisible(id){ return visibleLocs().some(l=>l.id===id); }
// Whether a given log entry should be visible to the currently logged-in person — entries tied
// to a specific store (sale/return/payment at a pointId, or a transfer/loss/purchase at a loc,
// or a transfer between two locs) are hidden from staff scoped to the other store. Entries with
// no store reference at all (new product added, generic notes) stay visible to everyone.
function txVisibleToCurrentPerson(tx){
  if(isOwnerUser() || !currentPerson || !currentPerson.pointId) return true;
  const mine = currentPerson.pointId;
  if(tx.pointId!=null) return tx.pointId===mine;
  if(tx.loc!=null) return tx.loc===mine || tx.loc==="godown";
  if(tx.from!=null || tx.to!=null) return tx.from===mine || tx.to===mine;
  return true;
}
function restoreSessionIfAny(){
  if(currentPerson) return; // already logged in this session
  try{
    const sess = JSON.parse(localStorage.getItem("al_ammar_session")||"null");
    if(!sess) { renderLockScreenIfNeeded(); return; }
    const ageHours = (Date.now()-sess.ts)/3600000;
    if(ageHours > SESSION_HOURS){ localStorage.removeItem("al_ammar_session"); renderLockScreenIfNeeded(); return; }
    const p = personOf(sess.personId);
    if(p){ currentPerson = p; }
    renderLockScreenIfNeeded();
  }catch(e){ renderLockScreenIfNeeded(); }
}
function renderLockScreenIfNeeded(){
  const overlay = document.getElementById("lockScreenOverlay");
  const wrap = document.getElementById("mainWrap");
  if(!overlay || !wrap) return;
  if(currentPerson){
    overlay.style.display = "none";
    wrap.style.display = "block";
    const badge = document.getElementById("personBadge");
    if(badge) badge.innerHTML = `👤 <b>${esc(currentPerson.name)}</b> <span onclick="logoutPerson()" style="cursor:pointer;text-decoration:underline;">لاگ آؤٹ</span>`;
  } else {
    wrap.style.display = "none";
    overlay.style.display = "block";
    overlay.innerHTML = renderLockScreen();
  }
}
function renderLockScreen(){
  const firstRun = state.loaded.people && state.people.length===1 && state.people[0].pin==="1234";
  return `<div style="max-width:340px;margin:60px auto;padding:0 16px;text-align:center;">
    <div class="brand" style="border:none;"><h1>العمار انٹرپرائزز</h1><p class="tagline">لاگ ان کریں</p></div>
    ${firstRun ? `<div class="err" style="background:#FBE7E2;border-color:var(--gold);color:#7a5c10;position:static;margin-bottom:14px;">پہلی بار؟ ڈیفالٹ پن: <b>1234</b> — بعد میں "اسٹور مینجمنٹ" سے تبدیل کر لیں۔</div>` : ""}
    <div class="card">
      <div class="field" style="margin-bottom:12px;">اپنا 4 ہندسوں کا پن درج کریں
        <input id="login-pin" type="password" inputmode="numeric" maxlength="8" class="ltr-input" dir="ltr" style="font-size:22px;text-align:center;letter-spacing:6px;margin-top:6px;" onkeydown="if(event.key==='Enter') attemptLogin();">
      </div>
      <button class="btn" style="background:var(--ink);width:100%;" onclick="attemptLogin()">داخل ہوں</button>
    </div>
  </div>`;
}
function attemptLogin(){
  const pin = document.getElementById("login-pin")?.value.trim();
  if(!pin) return showError("پن درج کریں۔");
  const p = state.people.find(person=>person.pin===pin);
  if(!p) return showError("غلط پن — دوبارہ کوشش کریں۔");
  currentPerson = p;
  try{ localStorage.setItem("al_ammar_session", JSON.stringify({personId:p.id, ts:Date.now()})); }catch(e){}
  renderLockScreenIfNeeded();
  render();
}
function logoutPerson(){
  currentPerson = null;
  try{ localStorage.removeItem("al_ammar_session"); }catch(e){}
  renderLockScreenIfNeeded();
}
function requireOwner(actionLabel){
  if(!currentPerson || currentPerson.role!=="owner"){ showError(`${actionLabel||"یہ عمل"} صرف مالک کر سکتا ہے۔`); return false; }
  return true;
}

/* ---- offline queue: sales made without internet are applied locally, then replayed once back online ---- */
function renderOfflineBadge(){
  const el = document.getElementById("offlineBadge");
  if(!el) return;
  const failedOp = pendingOps.find(op=>op.failed);
  if(failedOp) el.innerHTML = `<span class="stamp" style="border-color:var(--red);color:var(--red);cursor:pointer;" onclick="resolveFailedPendingOp('${failedOp.id}')" title="ٹیپ کر کے حل کریں">⚠️ آف لائن سیل سنک ناکام — ٹیپ کریں</span>`;
  else if(!isOnline) el.innerHTML = `<span class="stamp" style="border-color:var(--red);color:var(--red);">📡 آف لائن — انٹریز مقامی طور پر محفوظ ہو رہی ہیں</span>`;
  else if(pendingOps.length>0) el.innerHTML = `<span class="stamp" style="border-color:var(--gold);color:var(--gold);">⏳ ${pendingOps.length} انٹریز سنک ہو رہی ہیں...</span>`;
  else el.innerHTML = "";
}
async function resolveFailedPendingOp(opId){
  const op = pendingOps.find(o=>o.id===opId);
  if(!op) return;
  const ok = await askConfirm("یہ آف لائن سیل سرور پر محفوظ نہیں ہو سکی (اسٹاک کم پڑ گیا یا مہینہ بند ہو چکا تھا)۔ کیا آپ نے اسے خود دیکھ کر حل کر لیا ہے؟ 'جی ہاں' دبانے پر یہ قطار سے ہٹ جائے گی اور آئندہ سنکنگ جاری رہے گی۔");
  if(!ok) return;
  pendingOps = pendingOps.filter(o=>o.id!==opId);
  savePendingOps();
  if(op.localTx) state.txs = state.txs.filter(t=>t.id!==op.localTx.id);
  render();
  if(pendingOps.length>0 && isOnline) processPendingOps();
}
function rehydratePendingTxs(){
  pendingOps.forEach(op=>{
    if(!op.localTx) return;
    if(!state.txs.some(t=>t.id===op.localTx.id)) state.txs.unshift(op.localTx);
    // If this queued sale created a brand-new customer while offline, that customer only ever
    // existed in memory — a page refresh loses it (state.customers starts fresh from Firebase).
    // Restore it here too, or the shopkeeper won't see it/their balance until the sale actually
    // syncs, and might be tempted to re-add the same person as a second, duplicate customer.
    const lt = op.localTx;
    if(lt.customerId && String(lt.customerId).startsWith("offline_cust_") && lt.pointId){
      state.customers[lt.pointId] = state.customers[lt.pointId] || {};
      if(!state.customers[lt.pointId][lt.customerId]){
        state.customers[lt.pointId][lt.customerId] = {id:lt.customerId, name:lt.customerName, phone:lt.customerPhone, balance:(lt.creditAdded||0)};
      }
    }
  });
}
async function processPendingOps(){
  renderOfflineBadge();
  while(pendingOps.length>0 && isOnline){
    const op = pendingOps[0];
    if(op.failed) break; // already known to be unresolvable automatically — wait for the owner to fix it by hand
    try{
      let result;
      if(op.type==="sale") result = await finalizeBill(op.args.pointId, op.args.items, op.args.customer, op.args.originOverride);
      if(result === false){
        // The optimistic offline sale never actually happened server-side (e.g. stock ran out
        // for real by the time we reconnected). Silently shifting the queue here would make the
        // sale vanish with no trace. Instead: mark it, keep it (and its log line) visible, and
        // stop retrying it automatically so it doesn't loop forever — the owner must resolve it.
        op.failed = true;
        savePendingOps();
        if(op.localTx) op.localTx.note += " — ⚠️ سنک ناکام: اسٹاک کم پڑ گیا یا مہینہ بند تھا — لاگ میں جا کر خود درست کریں";
        showError("⚠️ آف لائن کے دوران بنائی گئی ایک سیل اب سنک نہیں ہو سکی — اسٹاک کم پڑ گیا یا مہینہ بند ہو چکا تھا۔ لاگ میں جا کر یہ انٹری خود دیکھیں اور درست کریں۔");
        render();
        break;
      }
      pendingOps.shift();
      savePendingOps();
      state.txs = state.txs.filter(t=>t.id!==op.localTx.id); // drop the synthetic entry; the real one arrives via the txs listener
      renderOfflineBadge();
      render();
    }catch(e){
      showError("آف لائن کے دوران بنائی گئی ایک انٹری اب سنک نہیں ہو سکی — براہ کرم لاگ چیک کریں: "+e.message);
      break;
    }
  }
  renderOfflineBadge();
}

/* ====================== EDIT (in-place correction of past entries) ====================== */
async function saveEditSale(txId){
  try{
    if(!requireOwner("بل میں ترمیم کرنا")) return;
    const tx = state.txs.find(t=>t.id===txId);
    if(!tx) return showError("یہ انٹری اب موجود نہیں۔");
    if(!isOnline) return showError("انٹرنیٹ کنکشن نہیں ہے — ترمیم صرف انٹرنیٹ بحال ہونے پر ممکن ہے۔");
    const point = pointOf(tx.pointId);
    if(!point) return showError("یہ سیل پوائنٹ اب موجود نہیں — ترمیم ممکن نہیں۔");
    if(tx.items.some(it=>!productOf(it.productId))) return showError("اس بل کا کوئی پروڈکٹ ہمیشہ کے لیے حذف ہو چکا ہے — اس بل میں ترمیم ممکن نہیں، صرف ڈیلیٹ کر سکتے ہیں۔");
    const newItems = tx.items.map((it,idx)=>{
      const qty = Number(document.getElementById(`edit-qty-${txId}-${idx}`)?.value)||0;
      const rate = Number(document.getElementById(`edit-rate-${txId}-${idx}`)?.value)||0;
      return {productId: it.productId, name: it.name, qty, rate, cost: it.cost ?? (productOf(it.productId)?.cost ?? 0)};
    }).filter(it=>it.qty>0); // a quantity of 0 means "remove this item from the bill", not an error
    if(newItems.length===0) return showError("بل میں کم از کم ایک آئٹم ہونا ضروری ہے — پورا بل ہٹانے کے لیے لاگ سے 🗑 (ڈیلیٹ) استعمال کریں۔");

    for(const it of tx.items){ await stockDelta(tx.pointId, it.productId, it.qty); }
    const committed = [];
    for(const it of newItems){
      const res = await stockDelta(tx.pointId, it.productId, -it.qty);
      if(!res.committed){
        const avail = res.snapshot ? (res.snapshot.val()||0) : 0;
        for(const done of committed){ await stockDelta(tx.pointId, done.productId, done.qty); }
        for(const it2 of tx.items){ await stockDelta(tx.pointId, it2.productId, -it2.qty); }
        showError(`${locLabel(tx.pointId)} پر "${productOf(it.productId)?.name}" صرف ${avail} یونٹ موجود ہے، آپ ${it.qty} یونٹ کی ترمیم کر رہے تھے — اس لیے یہ ترمیم منسوخ کر کے پرانی حالت واپس کر دی گئی۔`);
        return;
      }
      committed.push(it);
    }
    let totalAmount=0, fullProfit=0;
    newItems.forEach(it=>{ totalAmount += it.qty*it.rate; fullProfit += it.qty*(it.rate-(productOf(it.productId)?.cost||0)); });
    totalAmount = round2(totalAmount); fullProfit = round2(fullProfit);
    const share = round2(fullProfit*(point.share/100));
    // Owner's report always reflects the FULL revised bill amount — unaffected by any customer credit/advance logic below.
    if(tx.monthKey){
      await pointDelta(tx.monthKey, tx.pointId, -tx.totalAmount, -tx.fullProfit, -tx.yourShare);
      await pointDelta(tx.monthKey, tx.pointId, totalAmount, fullProfit, share);
    }

    // Customer ledger adjustment — completely separate from the owner's totals above.
    // amountPaid is the historical fact of cash actually received and never silently changes —
    // but if the owner tells us the customer paid something EXTRA right now (at edit time), that
    // gets added to the historical amountPaid rather than assumed away.
    const extraPaidNow = Math.max(0, round2(Number(document.getElementById(`edit-extra-paid-${txId}`)?.value)||0));
    let newCreditAdded = tx.creditAdded || 0;
    let newAmountPaid = tx.amountPaid || 0;
    if(tx.customerId){
      newAmountPaid = round2((tx.amountPaid||0) + extraPaidNow);
      newCreditAdded = round2(totalAmount - newAmountPaid); // can go negative -> customer now has an advance/credit
      const creditDelta = round2(newCreditAdded - (tx.creditAdded||0));
      if(creditDelta !== 0) await customerBalanceDelta(tx.pointId, tx.customerId, creditDelta);
    }

    await db.ref("txs/"+txId).update({
      items: newItems,
      totalAmount, fullProfit, yourShare: share,
      creditAdded: newCreditAdded, amountPaid: newAmountPaid,
      note: `${locLabel(tx.pointId)} — بل: ${newItems.length} ائٹمز${tx.customerId?` — کسٹمر: ${tx.customerName}`:""}`,
      edited: true, editedAt: nowStr(),
    });
    editingTxId = null;
    render();
    showSuccess(tx.customerId ? "بل کی ترمیم محفوظ ہو گئی — کسٹمر کا کھاتہ بھی خودکار اپڈیٹ ہو گیا۔" : "بل کی ترمیم محفوظ ہو گئی۔");
  }catch(e){ showError("ترمیم محفوظ کرتے وقت خرابی پیش آئی: "+e.message); }
}

async function saveEditTransfer(txId){
  try{
    if(!requireOwner("ٹرانسفر میں ترمیم کرنا")) return;
    const tx = state.txs.find(t=>t.id===txId);
    if(!tx) return showError("یہ انٹری اب موجود نہیں۔");
    if(!isOnline) return showError("انٹرنیٹ کنکشن نہیں ہے — ترمیم صرف انٹرنیٹ بحال ہونے پر ممکن ہے۔");
    if(!productOf(tx.productId)) return showError("یہ پروڈکٹ ہمیشہ کے لیے حذف ہو چکا ہے — اس انٹری میں ترمیم ممکن نہیں، صرف ڈیلیٹ کر سکتے ہیں۔");
    const newQty = Number(document.getElementById(`edit-qty-${txId}`)?.value);
    if(!newQty || newQty<=0) return showError("تعداد درست درج کریں۔");
    // Reverse the old transfer in the SAFE order: first take the units back OUT of `to`
    // (with a commit check — they may already have been sold there), and only then put
    // them back into `from`. Doing it the other way round could silently fail on the
    // `to` side while `from` already gained the units — creating stock out of thin air.
    const undoTo = await stockDelta(tx.to, tx.productId, -tx.qty);
    if(!undoTo.committed){
      const availTo = undoTo.snapshot ? (undoTo.snapshot.val()||0) : 0;
      return showError(`${locLabel(tx.to)} پر اب صرف ${availTo} یونٹ موجود ہے (شاید یہ مال آگے بک چکا ہے) — اس لیے یہ ٹرانسفر ترمیم نہیں ہو سکتی۔`);
    }
    await stockDelta(tx.from, tx.productId, tx.qty);
    const res = await stockDelta(tx.from, tx.productId, -newQty);
    if(!res.committed){
      const avail = res.snapshot ? (res.snapshot.val()||0) : 0;
      await stockDelta(tx.from, tx.productId, -tx.qty);
      await stockDelta(tx.to, tx.productId, tx.qty);
      showError(`${locLabel(tx.from)} پر "${productOf(tx.productId)?.name}" صرف ${avail} یونٹ موجود ہے، آپ ${newQty} یونٹ کی ترمیم کر رہے تھے — اس لیے یہ ترمیم منسوخ کر کے پرانی حالت واپس کر دی گئی۔`);
      return;
    }
    await stockDelta(tx.to, tx.productId, newQty);
    await db.ref("txs/"+txId).update({
      qty: newQty,
      note: `${productOf(tx.productId)?.name} — ${locLabel(tx.from)} سے ${locLabel(tx.to)} کو ${newQty} یونٹ منتقل`,
      edited: true, editedAt: nowStr(),
    });
    editingTxId = null;
    render();
    showSuccess("ٹرانسفر کی ترمیم محفوظ ہو گئی۔");
  }catch(e){ showError("ترمیم محفوظ کرتے وقت خرابی پیش آئی: "+e.message); }
}

async function saveEditReturn(txId){
  try{
    if(!requireOwner("ریٹرن میں ترمیم کرنا")) return;
    const tx = state.txs.find(t=>t.id===txId);
    if(!tx) return showError("یہ انٹری اب موجود نہیں۔");
    if(!isOnline) return showError("انٹرنیٹ کنکشن نہیں ہے — ترمیم صرف انٹرنیٹ بحال ہونے پر ممکن ہے۔");
    const point = pointOf(tx.pointId);
    if(!point) return showError("یہ سیل پوائنٹ اب موجود نہیں — ترمیم ممکن نہیں۔");
    if(!productOf(tx.productId)) return showError("یہ پروڈکٹ ہمیشہ کے لیے حذف ہو چکا ہے — اس انٹری میں ترمیم ممکن نہیں، صرف ڈیلیٹ کر سکتے ہیں۔");
    const newQty = Number(document.getElementById(`edit-qty-${txId}`)?.value);
    if(tx.saleTxId){
      // Invoice-linked return: the edited quantity must still fit within that bill.
      const sale = state.txs.find(t=>t.id===tx.saleTxId);
      const soldOnBill = sale?.items?.find(i2=>i2.productId===tx.productId)?.qty ?? Infinity;
      const otherReturns = state.txs.filter(t=>t.type==="return" && t.saleTxId===tx.saleTxId && t.productId===tx.productId && t.id!==txId)
        .reduce((a,t)=>a+(t.qty||0),0);
      const cap = soldOnBill - otherReturns;
      if(newQty > cap) return showError(`بل نمبر ${tx.invoiceNo} کے مطابق اس آئٹم کی ریٹرن زیادہ سے زیادہ ${cap} یونٹ ہو سکتی ہے۔`);
    }
    const newRate = Number(document.getElementById(`edit-rate-${txId}`)?.value);
    if(!newQty || newQty<=0) return showError("تعداد درست درج کریں۔");
    if(tx.saleTxId && newRate!==tx.rate) return showError(`یہ ریٹرن بل نمبر ${tx.invoiceNo} سے جڑی ہے — ریٹ اسی بل کا (${rupee(tx.rate)}) رہے گا، صرف تعداد بدلی جا سکتی ہے۔`);
    const res = await stockDelta(tx.pointId, tx.productId, -tx.qty);
    if(!res.committed){
      const avail = res.snapshot ? (res.snapshot.val()||0) : 0;
      return showError(`${locLabel(tx.pointId)} پر "${productOf(tx.productId)?.name}" صرف ${avail} یونٹ موجود ہے — یہ ریٹرن اس وقت کم نہیں کیا جا سکتا (شاید یہ مال دوبارہ بیچا جا چکا ہے)۔`);
    }
    if(tx.monthKey) await pointDelta(tx.monthKey, tx.pointId, tx.amount, tx.fullProfit, tx.yourShare);
    const p = productOf(tx.productId);
    const newAmount = round2(newQty*newRate);
    const costU = tx.costUsed ?? (p?.cost||0); // linked returns reverse the bill's own cost
    const newFullProfit = round2(newQty*(newRate-costU));
    const newShare = round2(newFullProfit*(point.share/100));
    await stockDelta(tx.pointId, tx.productId, newQty);
    if(tx.monthKey) await pointDelta(tx.monthKey, tx.pointId, -newAmount, -newFullProfit, -newShare);
    // Customer-settling return: shift his account from the old amount to the new one.
    if(tx.custId && tx.balanceDelta!=null){
      await customerBalanceDelta(tx.pointId, tx.custId, round2(tx.amount - newAmount));
    }
    await db.ref("txs/"+txId).update({
      qty:newQty, rate:newRate, amount:newAmount, fullProfit:newFullProfit, yourShare:newShare,
      balanceDelta: (tx.custId && tx.balanceDelta!=null) ? -newAmount : (tx.balanceDelta ?? null),
      note:`${p?.name} — ${locLabel(tx.pointId)} پر ${newQty} یونٹ (${rupee(newAmount)}) واپس آیا${tx.invoiceNo?` — بل نمبر ${tx.invoiceNo} کے خلاف`:""}${tx.custId?` — ${tx.customerName||""} کے کھاتے سے ${rupee(newAmount)} منہا`:""}`,
      edited: true, editedAt: nowStr(),
    });
    editingTxId = null;
    render();
    showSuccess("ریٹرن کی ترمیم محفوظ ہو گئی۔");
  }catch(e){ showError("ترمیم محفوظ کرتے وقت خرابی پیش آئی: "+e.message); }
}
