function splitScriptSegments(text){
  const rtlChar = /[\u0600-\u06FF\u0750-\u077F\uFB50-\uFDFF\uFE70-\uFEFF]/;
  const str = String(text||"");
  const segments = [];
  let current = "", currentRtl = null;
  for(const ch of str){
    const isSpace = /\s/.test(ch);
    const isRtl = rtlChar.test(ch);
    if(currentRtl === null){
      current += ch;
      if(!isSpace) currentRtl = isRtl;
    } else if(isSpace || isRtl === currentRtl){
      current += ch; // whitespace always extends the current run; same-script chars always extend it
    } else {
      segments.push({text: current.trim(), rtl: currentRtl});
      current = ch; currentRtl = isRtl;
    }
  }
  if(current.trim()) segments.push({text: current.trim(), rtl: currentRtl});
  return segments.filter(s=>s.text.length>0);
}
function bidiSafeSpan(text, styleStr){
  const segments = splitScriptSegments(text);
  if(segments.length<=1) return `<span style="${styleStr}">${esc(text)}</span>`;
  // html2canvas draws text via raw canvas fillText and does not implement the Unicode Bidi Algorithm,
  // so mixed-script strings (e.g. "Al Ammar پرنٹر") get garbled when drawn as one run.
  // Fix: split into single-script segments and let flexbox (which html2canvas positions correctly
  // as boxes) place them in the right visual order, instead of relying on canvas-level bidi.
  return `<span style="${styleStr};display:inline-flex;flex-direction:row;gap:5px;" dir="rtl">${segments.map(s=>`<span dir="${s.rtl?'rtl':'ltr'}">${esc(s.text)}</span>`).join('')}</span>`;
}

async function generateBillImageBlob(){
  if(typeof html2canvas === "undefined"){
    showError("تصویر بنانے کی سہولت لوڈ نہیں ہو سکی — انٹرنیٹ کنکشن چیک کریں اور دوبارہ کوشش کریں۔");
    return null;
  }
  renderBillImageTemplate(lastBillData);
  const inner = document.getElementById("billImageInner");
  const canvas = await html2canvas(inner, {scale:3, backgroundColor:"#F7F2E7"});
  return await new Promise(resolve => canvas.toBlob(blob => resolve(blob), "image/png"));
}

function downloadBillImage(blob, silent){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "bill-" + Date.now() + ".png"; // unique name avoids Chrome's "Download again?" prompt on repeat bills
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 5000);
  if(!silent) showSuccess("بل کی تصویر ڈاؤن لوڈ ہو گئی — اب اسے واٹس ایپ کھول کر منسلک (attach) کر کے بھیج دیں۔");
}

async function shareBillImage(){
  if(!lastBillData) return;
  try{
    const blob = await generateBillImageBlob();
    if(!blob){ return; }
    const phone = lastBillData.result.customerPhone;

    if(phone){
      // WhatsApp's direct-chat links (wa.me) only support pre-filled text, not attached files —
      // that's a WhatsApp platform limitation, not something a web page can work around.
      // Best achievable flow: download the image, then open that exact customer's chat directly,
      // so the person only needs one tap (📎 attach) to send the already-saved image.
      downloadBillImage(blob, true);
      showSuccess("بل کی تصویر ڈاؤن لوڈ ہو گئی — کسٹمر کی واٹس ایپ چیٹ کھل رہی ہے، 📎 سے تصویر منسلک کر کے بھیج دیں۔");
      const link = whatsAppLink(phone, "");
      if(link) setTimeout(()=>window.open(link, "waWindow"), 900);
      return;
    }

    // No saved phone number — no specific chat to target, so use the general share sheet instead.
    const file = new File([blob], "bill.png", {type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file], title:"بل"});
        showSuccess("بل شیئر کر دیا گیا۔");
      }catch(shareErr){
        downloadBillImage(blob);
      }
    } else {
      downloadBillImage(blob);
    }
  }catch(e){
    showError("تصویر بنانے میں خرابی پیش آئی: "+e.message);
  }
}

const EDITABLE_TYPES = ["sale","transfer","return","loss","purchase"];
function txMatchesLocFilter(tx, loc){
  if(loc==="all") return true;
  return tx.pointId===loc || tx.loc===loc || tx.from===loc || tx.to===loc;
}
function txMatchesDateFilter(tx, from, to){
  if(!tx.ts) return true;
  const d = new Date(tx.ts);
  if(from){ const f=new Date(from); if(d < f) return false; }
  if(to){ const t=new Date(to); t.setHours(23,59,59,999); if(d > t) return false; }
  return true;
}

function resetHistoryFilters(){
  ["hf-type","hf-loc","hf-month"].forEach(id=>{ const el=document.getElementById(id); if(el) el.value= id==="hf-month" ? "all" : "all"; });
  ["hf-from","hf-to","hf-search"].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=""; });
  applyHistoryFilters();
}
function getFilteredHistoryTxs(){
  const type = document.getElementById("hf-type")?.value || "all";
  const loc = document.getElementById("hf-loc")?.value || "all";
  const monthFilter = document.getElementById("hf-month")?.value || "all";
  const dateFrom = document.getElementById("hf-from")?.value || "";
  const dateTo = document.getElementById("hf-to")?.value || "";
  const search = (document.getElementById("hf-search")?.value || "").toLowerCase().trim();

  // If the typed search text exactly matches a known transaction-type label (سیل، ٹرانسفر، ریٹرن، وغیرہ),
  // filter strictly by that type — this avoids false matches (e.g. "سیل" wrongly matching "سیل پوائنٹ"
  // rename entries) and false negatives (e.g. "ریٹرن" not matching return entries whose note says "واپس آیا").
  let searchTypeMatch = null;
  if(search){
    for(const [key, meta] of Object.entries(TX_META)){
      if(meta.label.toLowerCase() === search){ searchTypeMatch = key; break; }
    }
  }

  return state.txs.filter(tx=>{
    if(!txVisibleToCurrentPerson(tx)) return false;
    if(type!=="all" && tx.type!==type) return false;
    if(!txMatchesLocFilter(tx, loc)) return false;
    if(!txMatchesDateFilter(tx, dateFrom, dateTo)) return false;
    if(monthFilter!=="all"){
      if(!txBelongsToMonth(tx, monthFilter)) return false;
    }
    if(search){
      if(searchTypeMatch){
        if(tx.type !== searchTypeMatch) return false;
      } else {
        const inNote = (tx.note||"").toLowerCase().includes(search);
        const inItems = tx.items ? tx.items.some(it=>(it.name||"").toLowerCase().includes(search)) : false;
        if(!inNote && !inItems) return false;
      }
    }
    return true;
  });
}
function buildHistoryFilterDescription(){
  const type = document.getElementById("hf-type")?.value || "all";
  const loc = document.getElementById("hf-loc")?.value || "all";
  const monthFilter = document.getElementById("hf-month")?.value || "all";
  const dateFrom = document.getElementById("hf-from")?.value || "";
  const dateTo = document.getElementById("hf-to")?.value || "";
  const search = document.getElementById("hf-search")?.value || "";
  const parts = [];
  if(type!=="all") parts.push(`قسم: ${TX_META[type]?.label||type}`);
  if(loc!=="all") parts.push(`لوکیشن: ${locLabel(loc)}`);
  if(monthFilter!=="all") parts.push(`مہینہ: ${state.months[monthFilter]?.label||monthFilter}`);
  if(dateFrom) parts.push(`از تاریخ: ${dateFrom}`);
  if(dateTo) parts.push(`تا تاریخ: ${dateTo}`);
  if(search) parts.push(`تلاش: ${search}`);
  return parts.length ? parts.join(" — ") : "تمام انٹریز (کوئی فلٹر لاگو نہیں)";
}
function applyHistoryFilters(){
  const mf = document.getElementById("hf-month")?.value || "all";
  if(mf!=="all") ensureFullTxHistory(); // background fetch; ensureFullTxHistory re-renders after merging
  const filtered = getFilteredHistoryTxs();

  const container = document.getElementById("history-results");
  if(!container) return;
  if(filtered.length===0){
    container.innerHTML = `<div class="card" style="border-style:dashed;text-align:center;color:var(--muted);padding:36px;">${state.txs.length===0?"ابھی کوئی ٹرانزیکشن ریکارڈ نہیں ہوئی۔":"اس فلٹر سے کوئی انٹری نہیں ملی۔"}</div>`;
    return;

}

function historyRowSummary(tx){
  const meta = TX_META[tx.type]||{label:tx.type};
  let amount = "";
  if(tx.type==="sale") amount = rupee(tx.totalAmount);
  else if(tx.type==="return") amount = tx.amount!=null ? "-"+rupee(tx.amount) : "";
  else if(tx.type==="loss") amount = tx.value!=null ? rupee(tx.value) : "";
  else if(tx.type==="payment") amount = (tx.refund?"-":"")+rupee(tx.amount);
  else if(tx.type==="transfer" || tx.type==="purchase") amount = tx.qty!=null ? `${tx.qty} عدد` : "";
  return {label: meta.label, amount};
}
function buildHistoryText(){
  const filtered = getFilteredHistoryTxs();
  let text = `العمار انٹرپرائزز — لاگ رپورٹ\n${buildHistoryFilterDescription()}\nکل انٹریز: ${filtered.length}\n------------------------------\n`;
  if(filtered.length===0){ text += "اس فلٹر سے کوئی انٹری نہیں ملی۔\n"; }
  else filtered.forEach((tx,i)=>{
    const {label, amount} = historyRowSummary(tx);

  });
  return text;
}

/* ====================== DOUBLE-TAP PROTECTION ====================== */
// On a phone it's easy to tap a money-affecting button twice before the first press finishes —
// which would create a duplicate bill/transfer/payment. Each wrapped function gets its OWN
// busy flag: a second tap on the same action is ignored while it runs, but one guarded
// function may still call another internally (e.g. the invoice-linked return button calls
// doReturn) — a single shared flag would silently swallow that inner call.
function guardOnce(fn){
  let busy = false;
  return async function(...args){
    if(busy) return;
    busy = true;
    try { return await fn.apply(this, args); }
    finally { busy = false; }
  };
}

doLoss = guardOnce(doLoss);
doReturn = guardOnce(doReturn);
doPurchase = guardOnce(doPurchase);
recordCustomerPayment = guardOnce(recordCustomerPayment);
submitNewCustomerAndSelect = guardOnce(submitNewCustomerAndSelect);
saveEditSale = guardOnce(saveEditSale);
saveEditTransfer = guardOnce(saveEditTransfer);
saveEditReturn = guardOnce(saveEditReturn);
saveEditLoss = guardOnce(saveEditLoss);
saveEditPurchase = guardOnce(saveEditPurchase);
deleteTx = guardOnce(deleteTx);
resolveFailedPendingOp = guardOnce(resolveFailedPendingOp);
submitLinkedReturn = guardOnce(submitLinkedReturn);
recordCustomerRefund = guardOnce(recordCustomerRefund);
